<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA Rede · Entrar</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/rede.css">
</head>
<body class="rede">
  <div class="login-pagina">
    <div class="login-caixa">
      <div class="marca">
        <strong>VIGIA</strong>
        <span>Painel da Rede · acompanhe todas as suas lojas</span>
      </div>
      <div id="erro" class="msg-erro"></div>
      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" autocomplete="username" placeholder="voce@suarede.com.br">
      </div>
      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" autocomplete="current-password">
      </div>
      <button class="btn" id="btnEntrar" style="width:100%">Entrar</button>
    </div>
  </div>

  <script src="/js/api-rede.js"></script>
  <script src="/js/auth-rede.js"></script>
  <script>
    const erroEl = document.getElementById('erro');

    async function entrar() {
      erroEl.classList.remove('visivel');
      const btn = document.getElementById('btnEntrar');
      btn.disabled = true; btn.textContent = 'Entrando...';
      try {
        await AuthRede.login(document.getElementById('email').value.trim(), document.getElementById('senha').value);
        window.location.href = '/rede/index.html';
      } catch (e) {
        erroEl.textContent = e.message;
        erroEl.classList.add('visivel');
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    }

    document.getElementById('btnEntrar').addEventListener('click', entrar);
    document.getElementById('senha').addEventListener('keydown', (ev) => { if (ev.key === 'Enter') entrar(); });

    if (ApiRede.getToken()) window.location.href = '/rede/index.html';
  </script>
</body>
</html>

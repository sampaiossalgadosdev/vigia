<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Açougue TV</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
  <style>
    /* Estilos do painel Açougue TV (token da TV e grid de cards das carnes) */
    .token-tv-linha { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .token-tv-valor {
      min-width: 170px; padding: 10px 16px; text-align: center;
      font-family: monospace; font-size: 22px; font-weight: 700; letter-spacing: 6px;
      color: var(--marinho); background: var(--fundo);
      border: 1px solid var(--linha); border-radius: var(--raio);
    }
    .token-tv-valor.vazio { font-size: 13px; letter-spacing: 0; font-weight: 400; color: var(--cinza); font-family: inherit; }
    .token-tv-dica { font-size: 12.5px; color: var(--cinza); margin-top: 10px; }

    .carnes-topo { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin: 22px 0 14px; }
    .carnes-topo .contagem { font-size: 14px; color: var(--cinza); }

    /* Barra de busca das carnes */
    .filtros-carnes { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-top: 16px; }
    .filtros-carnes .campo { display: flex; flex-direction: column; gap: 4px; }
    .filtros-carnes label { font-size: 12px; font-weight: 600; color: var(--cinza); }
    .filtros-carnes input, .filtros-carnes select {
      padding: 9px 12px; font-size: 14px; font-family: inherit;
      color: var(--grafite); background: var(--branco);
      border: 1px solid var(--linha); border-radius: var(--raio);
    }
    .filtros-carnes input:focus, .filtros-carnes select:focus { outline: 2px solid var(--azul); border-color: var(--azul); }
    .filtros-carnes .campo-nome input { min-width: 220px; }
    .filtros-carnes .campo-preco input { width: 130px; }

    .grid-carnes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .carne-card {
      background: var(--branco);
      border: 1px solid var(--linha); border-radius: var(--raio);
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .carne-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(2,18,38,.08); border-color: var(--azul); }
    .carne-foto {
      width: 100%; height: 150px; object-fit: cover; display: block;
      background: var(--azul-claro);
    }
    .carne-body { padding: 14px; }
    .carne-badges { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .badge-carne {
      font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
      background: var(--azul-claro); color: var(--azul-escuro);
    }
    .badge-carne.destaque { background: #fdf4e3; color: var(--amarelo); }
    .carne-nome { font-size: 15px; font-weight: 700; color: var(--grafite); margin-bottom: 6px; line-height: 1.3; }
    .carne-preco-original { font-size: 12px; color: var(--cinza); text-decoration: line-through; }
    .carne-preco { font-size: 19px; font-weight: 700; color: var(--azul); }
    .carne-preco small { font-size: 12px; font-weight: 400; color: var(--cinza); }
    .carne-off { font-size: 12px; color: var(--verde); font-weight: 600; margin-top: 2px; }
    .carne-periodo { font-size: 11.5px; color: var(--cinza); margin-top: 6px; }

    .grid-vazio {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px;
      color: var(--cinza); background: var(--branco);
      border: 1px dashed var(--linha); border-radius: var(--raio);
    }
    .grid-vazio strong { display: block; font-size: 16px; color: var(--grafite); margin-bottom: 6px; }

    .modal-destaque-produto { font-size: 14px; color: var(--cinza); margin: -6px 0 14px; }
    .modal-destaque-produto b { color: var(--grafite); }

    /* Centraliza o modal de destaque na tela (o padrão global alinha no topo).
       O margin:auto mantém o centro e ainda permite rolar se faltar altura. */
    #modalDestaque { align-items: center; }
    #modalDestaque .modal { margin: auto; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Açougue TV</h1>
      </div>

      <div class="painel">
        <h2 style="font-size:15px;margin-bottom:10px">Token da TV</h2>
        <div class="token-tv-linha">
          <span class="token-tv-valor vazio" id="tokenTv">Nenhum token gerado</span>
          <button class="btn secundario" id="btnCopiarToken">Copiar</button>
          <button class="btn" id="btnGerarToken">Gerar token</button>
        </div>
        <p class="token-tv-dica">
          Na televisão do açougue, abra <b>/tv.html</b> no navegador e digite este token para conectar.
          Gerar um novo token desconecta as TVs que usavam o anterior.
        </p>
      </div>

      <div class="painel filtros-carnes">
        <div class="campo campo-nome">
          <label>Nome</label>
          <input id="f_busca_nome" placeholder="Ex: picanha" autocomplete="off">
        </div>
        <div class="campo">
          <label>Grupo</label>
          <select id="f_busca_grupo"><option value="">Todos</option></select>
        </div>
        <div class="campo campo-preco">
          <label>Preço até (R$)</label>
          <input id="f_busca_preco" type="number" step="0.01" min="0" placeholder="Ex: 30,00">
        </div>
        <button class="btn secundario" id="btnLimparBusca">Limpar</button>
      </div>

      <div class="carnes-topo">
        <span class="contagem" id="contagem">Carregando...</span>
        <span class="contagem">Clique num produto para colocar em destaque na TV.</span>
      </div>
      <div class="grid-carnes" id="gridCarnes"></div>
    </main>
  </div>

  <!-- Modal de destaque: cria/edita/encerra a promoção que sustenta o destaque -->
  <div class="modal-fundo" id="modalDestaque">
    <div class="modal">
      <h2>Destaque na TV</h2>
      <p class="modal-destaque-produto" id="destaqueProduto"></p>
      <div class="form-grid">
        <div class="campo cheio"><label>Novo preço no destaque (R$)</label><input id="f_precoDestaque" type="number" step="0.01" min="0.01" placeholder="Ex: 55,90"></div>
        <div class="campo"><label>Início do destaque</label><input id="f_destaqueInicio" type="datetime-local"></div>
        <div class="campo"><label>Fim do destaque</label><input id="f_destaqueFim" type="datetime-local"></div>
      </div>
      <p class="msg-erro" id="erroDestaque"></p>
      <div class="rodape">
        <button class="btn secundario" id="btnRemoverDestaque" style="display:none">Remover destaque</button>
        <button class="btn secundario" id="btnCancelarDestaque">Cancelar</button>
        <button class="btn" id="btnSalvarDestaque">Salvar destaque</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/toast.js"></script>
  <script>
  (() => {
    initNavbar();
    const $ = (id) => document.getElementById(id);
    const gridCarnes = $('gridCarnes'), contagem = $('contagem'),
          tokenTv = $('tokenTv'), btnGerarToken = $('btnGerarToken'), btnCopiarToken = $('btnCopiarToken'),
          destaqueProduto = $('destaqueProduto'), erroDestaque = $('erroDestaque'),
          fPrecoDestaque = $('f_precoDestaque'), fDestaqueInicio = $('f_destaqueInicio'), fDestaqueFim = $('f_destaqueFim'),
          btnRemoverDestaque = $('btnRemoverDestaque'), btnSalvarDestaque = $('btnSalvarDestaque'),
          fBuscaNome = $('f_busca_nome'), fBuscaGrupo = $('f_busca_grupo'), fBuscaPreco = $('f_busca_preco');

    const FOTO_PLACEHOLDER = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150"><rect fill="#e9f2fe" width="400" height="150"/><text fill="#5a6b7e" x="200" y="85" text-anchor="middle" font-size="40">🥩</text></svg>'
    );

    let itens = [];
    let itemAtual = null;

    /** Date/ISO → valor de <input type="datetime-local"> no fuso local. */
    function paraInputLocal(data) {
      const d = new Date(data);
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 16);
    }

    function renderCard(p) {
      const badges = [];
      if (p.destaque) badges.push('<span class="badge-carne destaque">★ Destaque</span>');
      if (p.categoria) badges.push('<span class="badge-carne">' + UI.escapar(p.categoria) + '</span>');

      const unidade = '<small>/' + UI.escapar((p.unidade || 'KG').toLowerCase()) + '</small>';
      const preco = p.destaque
        ? '<div class="carne-preco-original">De ' + UI.moeda(p.preco) + '</div>' +
          '<div class="carne-preco">' + UI.moeda(p.precoPromocional) + unidade + '</div>' +
          (p.percentualOff ? '<div class="carne-off">↓ ' + p.percentualOff + '% de desconto</div>' : '') +
          (p.promocao ? '<div class="carne-periodo">' + UI.data(p.promocao.dataInicio) + ' até ' + UI.data(p.promocao.dataFim) + '</div>' : '')
        : '<div class="carne-preco">' + UI.moeda(p.preco) + unidade + '</div>';

      return '<div class="carne-card" data-id="' + p.id + '" title="Clique para configurar o destaque">' +
        '<img class="carne-foto" src="' + (p.imagemUrl ? UI.escapar(p.imagemUrl) : FOTO_PLACEHOLDER) + '" alt="" onerror="this.src=\'' + FOTO_PLACEHOLDER.replace(/'/g, '&#39;') + '\'">' +
        '<div class="carne-body">' +
        '<div class="carne-badges">' + badges.join('') + '</div>' +
        '<div class="carne-nome">' + UI.escapar(p.nome) + '</div>' +
        preco +
        '</div></div>';
    }

    /** Texto sem acentos e em minúsculas, para a busca por nome não depender de acentuação. */
    function normalizar(texto) {
      return String(texto || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    /** Preenche o select de grupo com as categorias presentes nos itens carregados. */
    function montarOpcoesGrupo() {
      const selecionado = fBuscaGrupo.value;
      const grupos = [...new Set(itens.map((p) => p.categoria).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'pt-BR'));
      fBuscaGrupo.innerHTML = '<option value="">Todos</option>' +
        grupos.map((g) => '<option value="' + UI.escapar(g) + '">' + UI.escapar(g) + '</option>').join('');
      if (grupos.includes(selecionado)) fBuscaGrupo.value = selecionado;
    }

    /** Aplica nome/grupo/preço sobre os itens carregados e redesenha o grid. */
    function aplicarFiltros() {
      const nome = normalizar(fBuscaNome.value.trim());
      const grupo = fBuscaGrupo.value;
      const precoMax = fBuscaPreco.value !== '' ? Number(fBuscaPreco.value) : null;

      const filtrados = itens.filter((p) => {
        if (nome && !normalizar(p.nome).includes(nome)) return false;
        if (grupo && p.categoria !== grupo) return false;
        // Compara com o preço realmente exibido na TV (promocional quando em destaque)
        const precoEfetivo = p.precoPromocional !== null && p.precoPromocional !== undefined ? p.precoPromocional : p.preco;
        if (precoMax !== null && !Number.isNaN(precoMax) && precoEfetivo > precoMax) return false;
        return true;
      });

      const filtrando = nome || grupo || precoMax !== null;
      contagem.textContent = filtrando
        ? filtrados.length + ' de ' + itens.length + ' produtos'
        : itens.length + ' produto' + (itens.length !== 1 ? 's' : '') + ' no açougue';

      if (!filtrados.length) {
        gridCarnes.innerHTML = '<div class="grid-vazio"><strong>Nenhum produto encontrado</strong>' +
          (filtrando ? 'Ajuste os filtros de nome, grupo ou preço.' : 'Cadastre produtos nas categorias do grupo "Açougue" para exibi-los na TV.') +
          '</div>';
        return;
      }
      gridCarnes.innerHTML = filtrados.map(renderCard).join('');
    }

    function limparFiltros() {
      fBuscaNome.value = '';
      fBuscaGrupo.value = '';
      fBuscaPreco.value = '';
      aplicarFiltros();
    }

    async function carregarCarnes() {
      const data = await API.get('/api/acougue-tv/produtos');
      if (!data.grupo) {
        contagem.textContent = 'Grupo "Açougue" não encontrado';
        gridCarnes.innerHTML = '<div class="grid-vazio"><strong>Crie o grupo de categorias "Açougue"</strong>' +
          'A TV exibe os produtos ativos do grupo "Açougue" e de seus subgrupos. Crie-o em Produtos → Categorias de Produtos.</div>';
        return;
      }
      itens = data.items;
      montarOpcoesGrupo();
      aplicarFiltros();
    }

    // ── Token da TV ──
    function mostrarToken(valor) {
      if (valor) {
        tokenTv.textContent = valor;
        tokenTv.classList.remove('vazio');
        btnGerarToken.textContent = 'Gerar novo token';
      } else {
        tokenTv.textContent = 'Nenhum token gerado';
        tokenTv.classList.add('vazio');
        btnGerarToken.textContent = 'Gerar token';
      }
    }

    async function carregarToken() {
      const data = await API.get('/api/acougue-tv/token');
      mostrarToken(data.tvToken);
    }

    async function gerarToken() {
      if (!tokenTv.classList.contains('vazio') &&
          !confirm('Gerar um novo token desconecta as TVs que usam o token atual. Continuar?')) return;
      const data = await API.post('/api/acougue-tv/token', {});
      mostrarToken(data.tvToken);
      mostrarToast('Token da TV gerado', 'sucesso');
    }

    function copiarToken() {
      if (tokenTv.classList.contains('vazio')) { mostrarToast('Gere o token primeiro', 'erro'); return; }
      navigator.clipboard.writeText(tokenTv.textContent).then(() => mostrarToast('Token copiado', 'sucesso'));
    }

    // ── Modal de destaque ──
    function abrirDestaque(id) {
      itemAtual = itens.find((p) => p.id === id);
      if (!itemAtual) return;
      UI.limparErro(erroDestaque);
      destaqueProduto.innerHTML = '<b>' + UI.escapar(itemAtual.nome) + '</b> · preço atual ' +
        UI.moeda(itemAtual.preco) + '/' + UI.escapar((itemAtual.unidade || 'KG').toLowerCase());

      if (itemAtual.promocao) {
        fPrecoDestaque.value = itemAtual.precoPromocional;
        fDestaqueInicio.value = paraInputLocal(itemAtual.promocao.dataInicio);
        fDestaqueFim.value = paraInputLocal(itemAtual.promocao.dataFim);
        btnRemoverDestaque.style.display = '';
      } else {
        fPrecoDestaque.value = '';
        fDestaqueInicio.value = paraInputLocal(new Date());
        fDestaqueFim.value = paraInputLocal(new Date(Date.now() + 7 * 24 * 60 * 60 * 1000));
        btnRemoverDestaque.style.display = 'none';
      }
      UI.abrirModal('modalDestaque');
    }

    async function salvarDestaque() {
      UI.limparErro(erroDestaque);
      const novoPreco = Number(fPrecoDestaque.value);
      if (!novoPreco || novoPreco <= 0) return UI.erro(erroDestaque, 'Informe o novo preço do destaque');
      if (novoPreco >= itemAtual.preco) return UI.erro(erroDestaque, 'O preço do destaque deve ser menor que o preço atual (' + UI.moeda(itemAtual.preco) + ')');
      if (!fDestaqueInicio.value || !fDestaqueFim.value) return UI.erro(erroDestaque, 'Informe o início e o fim do destaque');
      if (new Date(fDestaqueFim.value) <= new Date(fDestaqueInicio.value)) return UI.erro(erroDestaque, 'O fim do destaque deve ser depois do início');

      // O destaque é uma promoção de valor fixo: desconto = preço atual − novo preço.
      // <input type="datetime-local"> devolve uma string SEM fuso (ex:
      // "2026-07-15T22:00") — mandar isso direto pro backend é o bug: o
      // servidor roda em UTC e interpretaria "22:00" como 22:00 UTC, não
      // 22:00 de Brasília (que é 01:00 UTC do dia seguinte). Um destaque
      // "válido até as 22h de hoje" nascia com dataFim já no passado e
      // nunca aparecia como vigente (nem aqui, nem no preço do PDV).
      // new Date(valor) — executado AQUI, no navegador — interpreta a
      // string no fuso local de quem está cadastrando, então .toISOString()
      // já sai com o instante UTC correto.
      const body = {
        produtoId: itemAtual.id,
        nome: 'Destaque TV — ' + itemAtual.nome,
        tipo: 'valor_fixo',
        desconto: +(itemAtual.preco - novoPreco).toFixed(2),
        dataInicio: new Date(fDestaqueInicio.value).toISOString(),
        dataFim: new Date(fDestaqueFim.value).toISOString(),
      };
      try {
        if (itemAtual.promocao) await API.put('/api/promocoes/' + itemAtual.promocao.id, body);
        else await API.post('/api/promocoes', body);
        UI.fecharModal('modalDestaque');
        mostrarToast('Destaque salvo', 'sucesso');
        await carregarCarnes();
      } catch (e) {
        UI.erro(erroDestaque, e);
      }
    }

    async function removerDestaque() {
      if (!itemAtual || !itemAtual.promocao) return;
      try {
        await API.del('/api/promocoes/' + itemAtual.promocao.id);
        UI.fecharModal('modalDestaque');
        mostrarToast('Destaque removido', 'sucesso');
        await carregarCarnes();
      } catch (e) {
        UI.erro(erroDestaque, e);
      }
    }

    gridCarnes.addEventListener('click', (ev) => {
      const card = ev.target.closest('.carne-card[data-id]');
      if (card) abrirDestaque(card.dataset.id);
    });
    fBuscaNome.addEventListener('input', aplicarFiltros);
    fBuscaGrupo.addEventListener('change', aplicarFiltros);
    fBuscaPreco.addEventListener('input', aplicarFiltros);
    $('btnLimparBusca').addEventListener('click', limparFiltros);
    btnGerarToken.addEventListener('click', () => gerarToken().catch((e) => mostrarToast(e.message, 'erro')));
    btnCopiarToken.addEventListener('click', copiarToken);
    btnSalvarDestaque.addEventListener('click', salvarDestaque);
    btnRemoverDestaque.addEventListener('click', removerDestaque);
    $('btnCancelarDestaque').addEventListener('click', () => UI.fecharModal('modalDestaque'));

    (async () => {
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      await Auth.montarSidebar('acougue-tv.html');
      await Promise.all([carregarCarnes(), carregarToken()]).catch((e) => mostrarToast(e.message, 'erro'));
    })();
  })();
  </script>
</body>
</html>

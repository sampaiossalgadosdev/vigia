<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Fornecedores</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Fornecedores</h1>
      </div>

      <div class="barra-acoes">
        <input type="search" id="busca" placeholder="Buscar por nome ou CNPJ">
        <button class="btn" id="btnNovoFornecedor">Novo fornecedor</button>
      </div>

      <div class="painel">
        <table>
          <thead><tr><th>Nome</th><th>CNPJ</th><th>E-mail</th><th>Telefone</th><th></th></tr></thead>
          <tbody id="tabela"><tr><td colspan="5" class="vazio">Carregando...</td></tr></tbody>
        </table>
        <div class="paginacao">
          <button class="btn secundario pequeno" id="btnPaginaAnterior">Anterior</button>
          <span id="infoPagina"></span>
          <button class="btn secundario pequeno" id="btnPaginaProxima">Próxima</button>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-fundo" id="modalFornecedor">
    <div class="modal">
      <h2 id="tituloModal">Novo fornecedor</h2>
      <div id="erroModal" class="msg-erro"></div>
      <div class="form-grid">
        <div class="campo cheio"><label>Nome *</label><input id="f_nome" maxlength="200"></div>
        <div class="campo"><label>CNPJ *</label><input id="f_cnpj" maxlength="18" placeholder="Somente números"></div>
        <div class="campo"><label>Telefone</label><input id="f_telefone" maxlength="20"></div>
        <div class="campo cheio"><label>E-mail</label><input id="f_email" type="email"></div>
      </div>
      <div class="rodape">
        <button class="btn secundario" id="btnCancelarFornecedor">Cancelar</button>
        <button class="btn" id="btnSalvar">Salvar</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
  (() => {
    initNavbar();
    let pagina = 1, totalPaginas = 1, editandoId = null;

    // Referências capturadas na injeção do script: se o usuário navegar para
    // outra página antes de um fetch terminar, buscar por id retornaria null;
    // nos elementos órfãos a escrita tardia é um no-op inofensivo.
    const $ = (id) => document.getElementById(id);
    const busca = $('busca'), tabela = $('tabela'), infoPagina = $('infoPagina');
    const tituloModal = $('tituloModal'), erroModal = $('erroModal');
    const fNome = $('f_nome'), fCnpj = $('f_cnpj'), fTelefone = $('f_telefone'), fEmail = $('f_email');

    /** Validação de CNPJ no frontend (formato + dígitos verificadores). */
    function cnpjValido(valor) {
      const cnpj = String(valor || '').replace(/\D/g, '');
      if (cnpj.length !== 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
      const calc = (nums, pesos) => {
        const soma = nums.reduce((acc, n, i) => acc + n * pesos[i], 0);
        const resto = soma % 11;
        return resto < 2 ? 0 : 11 - resto;
      };
      const n = cnpj.split('').map(Number);
      return calc(n.slice(0, 12), [5,4,3,2,9,8,7,6,5,4,3,2]) === n[12]
        && calc(n.slice(0, 13), [6,5,4,3,2,9,8,7,6,5,4,3,2]) === n[13];
    }

    async function carregar() {
      const termo = encodeURIComponent(busca.value.trim());
      const data = await API.get('/api/fornecedores?page=' + pagina + '&limit=20&search=' + termo);
      totalPaginas = data.totalPages || 1;
      infoPagina.textContent = 'Página ' + data.page + ' de ' + totalPaginas + ' · ' + data.total + ' fornecedores';
      if (data.items.length === 0) { tabela.innerHTML = '<tr><td colspan="5" class="vazio">Nenhum fornecedor encontrado.</td></tr>'; return; }
      tabela.innerHTML = data.items.map((f) =>
        '<tr><td>' + UI.escapar(f.nome) + '</td><td>' + f.cnpj + '</td>' +
        '<td>' + UI.escapar(f.email || '-') + '</td><td>' + UI.escapar(f.telefone || '-') + '</td>' +
        '<td><button class="btn secundario pequeno" data-acao="editar" data-id="' + f.id + '">Editar</button> ' +
        '<button class="btn perigo pequeno" data-acao="remover" data-id="' + f.id + '">Excluir</button></td></tr>'
      ).join('');
    }

    function mudarPagina(delta) {
      const nova = pagina + delta;
      if (nova < 1 || nova > totalPaginas) return;
      pagina = nova; carregar();
    }

    function abrirNovo() {
      editandoId = null;
      tituloModal.textContent = 'Novo fornecedor';
      UI.limparErro(erroModal);
      [fNome, fCnpj, fTelefone, fEmail].forEach((campo) => campo.value = '');
      UI.abrirModal('modalFornecedor');
    }

    async function editar(id) {
      const f = await API.get('/api/fornecedores/' + id);
      editandoId = id;
      tituloModal.textContent = 'Editar fornecedor';
      UI.limparErro(erroModal);
      fNome.value = f.nome;
      fCnpj.value = f.cnpj;
      fTelefone.value = f.telefone || '';
      fEmail.value = f.email || '';
      UI.abrirModal('modalFornecedor');
    }

    async function salvar() {
      UI.limparErro(erroModal);
      const cnpj = fCnpj.value;
      if (!cnpjValido(cnpj)) {
        UI.erro(erroModal, 'CNPJ inválido: verifique os 14 dígitos.');
        return;
      }
      const body = {
        nome: fNome.value.trim(),
        cnpj: cnpj.replace(/\D/g, ''),
        telefone: fTelefone.value.trim(),
        email: fEmail.value.trim(),
      };
      try {
        if (editandoId) await API.put('/api/fornecedores/' + editandoId, body);
        else await API.post('/api/fornecedores', body);
        UI.fecharModal('modalFornecedor');
        carregar();
      } catch (e) {
        UI.erro(erroModal, e);
      }
    }

    function remover(id) {
      return UI.confirmarAcao('Desativar este fornecedor?', async () => {
        await API.del('/api/fornecedores/' + id);
        carregar();
      });
    }

    // ─── Eventos ───
    $('btnNovoFornecedor').addEventListener('click', abrirNovo);
    $('btnPaginaAnterior').addEventListener('click', () => mudarPagina(-1));
    $('btnPaginaProxima').addEventListener('click', () => mudarPagina(1));
    $('btnCancelarFornecedor').addEventListener('click', () => UI.fecharModal('modalFornecedor'));
    $('btnSalvar').addEventListener('click', salvar);
    busca.addEventListener('input', () => { pagina = 1; carregar(); });
    tabela.addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-acao]');
      if (!btn) return;
      if (btn.dataset.acao === 'editar') editar(btn.dataset.id);
      if (btn.dataset.acao === 'remover') remover(btn.dataset.id);
    });

    (async () => {
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      await Auth.montarSidebar('fornecedores.html');
      carregar();
    })();
  })();
  </script>
</body>
</html>

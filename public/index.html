<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Dashboard</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Dashboard</h1>
      </div>

      <div class="cards">
        <div class="card"><div class="rotulo">Saídas hoje (estimado)</div><div class="valor" id="cardHoje">—</div></div>
        <div class="card"><div class="rotulo">Produtos cadastrados</div><div class="valor" id="cardProdutos">—</div></div>
        <div class="card alerta"><div class="rotulo">Alertas de estoque</div><div class="valor" id="cardAlertas">—</div></div>
        <div class="card"><div class="rotulo">Sugestões pendentes</div><div class="valor" id="cardSugestoes">—</div></div>
      </div>

      <div class="painel">
        <h2>Últimas movimentações</h2>
        <table>
          <thead><tr><th>Data</th><th>Produto</th><th>Tipo</th><th>Qtd</th><th>Origem</th></tr></thead>
          <tbody id="tabelaMovs"><tr><td colspan="5" class="vazio">Carregando...</td></tr></tbody>
        </table>
      </div>

      <div class="painel">
        <h2>Sugestões recebidas</h2>
        <div id="listaSugestoes" class="vazio">Carregando...</div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
  (() => {
    initNavbar();
    // Referências capturadas na injeção do script: se o usuário navegar para
    // outra página antes de um fetch terminar, buscar por id retornaria null;
    // nos elementos órfãos a escrita tardia é um no-op inofensivo.
    const $ = (id) => document.getElementById(id);
    const cardHoje = $('cardHoje'), cardProdutos = $('cardProdutos'),
          cardAlertas = $('cardAlertas'), cardSugestoes = $('cardSugestoes'),
          listaSugestoes = $('listaSugestoes'), tabelaMovs = $('tabelaMovs');

    async function carregarDashboard() {
      try {
        const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
        const [produtos, alertas, sugestoes, movsHoje] = await Promise.all([
          API.get('/api/produtos?limit=1'),
          API.get('/api/produtos/estoque/alertas'),
          API.get('/api/sugestoes?limit=5'),
          API.get('/api/estoque/movimentacoes?tipo=saida&inicio=' + hoje.toISOString() + '&limit=100'),
        ]);
        cardProdutos.textContent = UI.numero(produtos.total);
        cardAlertas.textContent = UI.numero(alertas.total);
        cardSugestoes.textContent = UI.numero(sugestoes.pendentes);
        cardHoje.textContent = UI.numero(movsHoje.total) + ' mov.';

        if (sugestoes.items.length === 0) listaSugestoes.textContent = 'Nenhuma sugestão recebida.';
        else
          listaSugestoes.innerHTML = sugestoes.items.map((s) =>
            '<div style="padding:10px 0;border-bottom:1px solid var(--linha)">' +
            '<span class="tag ' + (s.status === 'pendente' ? 'pendente' : 'neutro') + '">' + s.tipo + '</span> ' +
            '<strong>' + UI.escapar(s.titulo) + '</strong>' +
            '<div style="font-size:13px;color:var(--cinza);margin-top:4px">' + UI.escapar(s.mensagem) + '</div>' +
            (s.status === 'pendente'
              ? '<button class="btn secundario pequeno" style="margin-top:6px" data-acao="marcar-lida" data-id="' + s.id + '">Marcar como lida</button>'
              : '') +
            '</div>'
          ).join('');
      } catch (e) { console.error(e); }

      try {
        const movs = await API.get('/api/estoque/movimentacoes?limit=5');
        if (movs.items.length === 0) tabelaMovs.innerHTML = '<tr><td colspan="5" class="vazio">Sem movimentações ainda.</td></tr>';
        else
          tabelaMovs.innerHTML = movs.items.map((m) =>
            '<tr><td>' + UI.data(m.criadoEm) + '</td><td>' + UI.escapar(m.produto.nome) + '</td>' +
            '<td><span class="tag ' + (m.tipo === 'entrada' ? 'ok' : 'neutro') + '">' + m.tipo + '</span></td>' +
            '<td>' + m.quantidade + ' ' + m.produto.unidade + '</td><td>' + m.origem + '</td></tr>'
          ).join('');
      } catch (e) { console.error(e); }
    }

    async function marcarLida(id) {
      try { await API.put('/api/sugestoes/' + id + '/lida'); await carregarDashboard(); }
      catch (e) { alert(e.message); }
    }

    listaSugestoes.addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-acao="marcar-lida"]');
      if (btn) marcarLida(btn.dataset.id);
    });

    (async () => {
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      await Auth.montarSidebar('index.html');
      await carregarDashboard();
    })();
  })();
  </script>
</body>
</html>

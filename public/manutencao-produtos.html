<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Manutenção de Produtos</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <div style="display:flex;align-items:center;gap:10px">
          <a href="/produtos.html" class="btn-voltar" title="Voltar para Produtos" aria-label="Voltar para Produtos"><i class="fa-solid fa-arrow-left"></i></a>
          <h1>Manutenção de Produtos</h1>
        </div>
        <span id="subtituloProduto" style="color:var(--cinza);font-size:14px"></span>
      </div>

      <div id="erroGeral" class="msg-erro"></div>

      <!-- Painel 1: abas -->
      <div class="painel">
        <div class="abas">
          <button class="ativa" data-aba="cadastrais">Dados Cadastrais</button>
          <button data-aba="tributarias">Informações Tributárias</button>
          <button data-aba="estoque">Estoque e Fornecedor</button>
        </div>

        <!-- Aba 1: Dados Cadastrais (form-grid deixa espaço pra novos campos) -->
        <div class="aba-conteudo ativa" id="aba-cadastrais">
          <div class="form-grid">
            <div class="campo cheio"><label>Nome *</label><input id="m_nome" maxlength="200"></div>
            <div class="campo"><label>Grupo *</label>
              <select id="m_categoria"><option value="">Carregando...</option></select>
            </div>
            <div class="campo"><label>Unidade de medida *</label>
              <select id="m_unidade"><option>UN</option><option>KG</option><option>CX</option><option>L</option><option>PC</option><option>FD</option></select>
            </div>
            <div class="campo"><label>Marca</label><input id="m_marca" maxlength="100"></div>
          </div>
        </div>

        <!-- Aba 2: Informações Tributárias — NCM/CFOP/CST-IBS-CBS/cClassTrib são
             busca+seleção nos catálogos de referência (nunca texto livre: um
             código que não existe na tabela de referência é rejeitado ao
             salvar, ver produto.validator.js). -->
        <div class="aba-conteudo" id="aba-tributarias">
          <div class="form-grid">
            <div class="campo" style="position:relative">
              <label>NCM *</label>
              <input id="m_ncm" placeholder="Digite o código ou a descrição..." autocomplete="off">
              <div class="sugestoes" id="sugestoesNcm" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--linha);border-radius:6px;z-index:50;display:none;max-height:220px;overflow-y:auto;box-shadow:0 4px 10px rgba(0,0,0,.12)"></div>
            </div>
            <div class="campo"><label>Configuração tributária</label>
              <select id="m_configTrib">
                <option value="">Não informada</option>
                <option value="tributado_integral">Tributado integral</option>
                <option value="substituicao_tributaria">Substituição tributária</option>
                <option value="isento">Isento</option>
                <option value="nao_tributado">Não tributado</option>
              </select>
            </div>
            <div class="campo" style="position:relative">
              <label>CFOP *</label>
              <input id="m_cfop" placeholder="Digite o código ou a descrição..." autocomplete="off">
              <div class="sugestoes" id="sugestoesCfop" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--linha);border-radius:6px;z-index:50;display:none;max-height:220px;overflow-y:auto;box-shadow:0 4px 10px rgba(0,0,0,.12)"></div>
            </div>
            <div class="campo"><label>Origem</label>
              <select id="m_origem">
                <option value="">Não informada</option>
                <option value="nacional">Nacional</option>
                <option value="importado">Importado</option>
              </select>
            </div>
            <div class="campo" style="position:relative">
              <label>CST-IBS/CBS (Reforma Tributária) *</label>
              <input id="m_cstIbsCbs" placeholder="Digite o código ou a descrição..." autocomplete="off">
              <div class="sugestoes" id="sugestoesCstIbsCbs" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--linha);border-radius:6px;z-index:50;display:none;max-height:220px;overflow-y:auto;box-shadow:0 4px 10px rgba(0,0,0,.12)"></div>
            </div>
            <div class="campo" style="position:relative">
              <label>cClassTrib (Reforma Tributária) *</label>
              <input id="m_classTrib" placeholder="Digite o código ou a descrição..." autocomplete="off">
              <div class="sugestoes" id="sugestoesClassTrib" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--linha);border-radius:6px;z-index:50;display:none;max-height:220px;overflow-y:auto;box-shadow:0 4px 10px rgba(0,0,0,.12)"></div>
            </div>
          </div>
        </div>

        <!-- Aba 3: Estoque e Fornecedor (somente leitura) -->
        <div class="aba-conteudo" id="aba-estoque">
          <div class="form-grid">
            <div class="campo"><label>Estoque total</label><input id="m_estoqueTotal" readonly></div>
            <div class="campo"><label>Preço da última compra</label><input id="m_ultPreco" readonly></div>
            <div class="campo"><label>Fornecedor da última compra</label><input id="m_ultFornecedor" readonly></div>
            <div class="campo"><label>Data da última compra</label><input id="m_ultData" readonly></div>
            <div class="campo">
              <label><input type="checkbox" id="m_permiteNegativo" style="width:auto"> Permite estoque negativo</label>
            </div>
            <div class="campo">
              <label><input type="checkbox" id="m_controlaLote" style="width:auto"> Controla lote/validade</label>
            </div>
          </div>
        </div>
      </div>

      <!-- Painel 2: Preços (sempre visível) -->
      <div class="painel">
        <h2>Preços</h2>
        <div class="form-grid">
          <div class="campo"><label>Preço médio</label><input id="m_precoMedio" readonly></div>
          <div class="campo"><label>Preço da última compra</label><input id="m_precoAtual" readonly></div>
        </div>
        <div class="form-grid tres">
          <div class="campo"><label>Markup desejado (%)</label><input id="m_markupDesejado" type="number" step="0.1" placeholder="35,0%"></div>
          <div class="campo"><label>Markup atual (%)</label><input id="m_markupAtual" readonly></div>
          <div class="campo"><label>Preço atual (venda) (R$) *</label><input id="m_precoVenda" type="number" step="0.01" min="0.01"></div>
        </div>
      </div>

      <!-- Painel 3: Códigos -->
      <div class="painel">
        <h2>Códigos</h2>
        <div class="form-grid">
          <div class="campo"><label>EAN *</label><input id="m_ean" maxlength="14"></div>
          <div class="campo"><label>Cód. Ref.</label><input id="m_codRef" maxlength="20"></div>
        </div>
      </div>

      <div class="rodape" style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:24px">
        <button class="btn secundario" id="btnCancelar">Cancelar</button>
        <button class="btn" id="btnSalvar">Salvar</button>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/toast.js"></script>
  <script>
  (() => {
    initNavbar();
    const $ = (id) => document.getElementById(id);
    const erroGeral = $('erroGeral');
    const produtoId = new URLSearchParams(window.location.search).get('id');
    // Base do cálculo de markup (markup = preço/preçoMédio − 1); definido no carregar().
    let precoMedioNum = 0;

    // Aba onde cada campo validável vive, pra apontar o erro mesmo que o
    // usuário esteja em outra aba na hora de salvar.
    const ABAS_ROTULO = { cadastrais: 'Dados Cadastrais', tributarias: 'Informações Tributárias', estoque: 'Estoque e Fornecedor', precos: 'Preços', codigos: 'Códigos' };

    function trocarAba(nome) {
      document.querySelectorAll('.abas button').forEach((b) => b.classList.toggle('ativa', b.dataset.aba === nome));
      document.querySelectorAll('.aba-conteudo').forEach((c) => c.classList.toggle('ativa', c.id === 'aba-' + nome));
    }
    document.querySelectorAll('.abas button').forEach((b) => b.addEventListener('click', () => trocarAba(b.dataset.aba)));

    function debounce(fn, ms) {
      let temporizador;
      return (...args) => { clearTimeout(temporizador); temporizador = setTimeout(() => fn(...args), ms); };
    }

    /**
     * Busca+seleção num catálogo fiscal de referência (NCM/CFOP/CST-IBS-CBS/
     * cClassTrib) — nunca texto livre. `obter()` só devolve um código real
     * quando o usuário CLICOU numa sugestão (ou quando `definir()` foi
     * chamado ao carregar o produto); digitar sem selecionar limpa a seleção
     * de propósito, pra nunca submeter texto livre digitado por engano.
     */
    function criarSeletorCatalogo({ inputId, sugestoesId, endpoint, formatarSugestao }) {
      const input = $(inputId), caixa = $(sugestoesId);
      let codigoSelecionado = null;

      const buscar = debounce(async () => {
        const termo = input.value.trim();
        if (!termo) { caixa.style.display = 'none'; return; }
        try {
          const itens = await API.get(endpoint + '?termo=' + encodeURIComponent(termo));
          caixa.innerHTML = itens.length
            ? itens.map((it) => '<div class="sugestao" data-codigo="' + UI.escapar(it.codigo) + '" data-texto="' + UI.escapar(formatarSugestao(it)) + '" style="padding:8px 12px;cursor:pointer">' + UI.escapar(formatarSugestao(it)) + '</div>').join('')
            : '<div style="padding:8px 12px;color:var(--cinza)">Nenhum código encontrado no catálogo</div>';
          caixa.style.display = 'block';
        } catch (e) { caixa.style.display = 'none'; }
      }, 300);

      input.addEventListener('input', () => { codigoSelecionado = null; buscar(); });
      caixa.addEventListener('click', (ev) => {
        const sug = ev.target.closest('.sugestao[data-codigo]');
        if (!sug) return;
        codigoSelecionado = sug.dataset.codigo;
        input.value = sug.dataset.texto;
        caixa.style.display = 'none';
      });

      return {
        obter: () => codigoSelecionado,
        definir(codigo, textoExibicao) {
          codigoSelecionado = codigo || null;
          input.value = textoExibicao || codigo || '';
        },
      };
    }

    const seletorNcm = criarSeletorCatalogo({ inputId: 'm_ncm', sugestoesId: 'sugestoesNcm', endpoint: '/api/produtos/catalogos/ncm', formatarSugestao: (it) => it.codigo + ' - ' + it.descricao });
    const seletorCfop = criarSeletorCatalogo({ inputId: 'm_cfop', sugestoesId: 'sugestoesCfop', endpoint: '/api/produtos/catalogos/cfop', formatarSugestao: (it) => it.codigo + ' - ' + it.descricao });
    const seletorCstIbsCbs = criarSeletorCatalogo({ inputId: 'm_cstIbsCbs', sugestoesId: 'sugestoesCstIbsCbs', endpoint: '/api/produtos/catalogos/cst-ibs-cbs', formatarSugestao: (it) => it.codigo + ' - ' + it.descricao });
    const seletorClassTrib = criarSeletorCatalogo({ inputId: 'm_classTrib', sugestoesId: 'sugestoesClassTrib', endpoint: '/api/produtos/catalogos/class-trib', formatarSugestao: (it) => it.codigo + ' - ' + it.descricao });

    async function carregarCategorias(selecionadaId) {
      const categorias = await API.get('/api/produtos/categorias');
      $('m_categoria').innerHTML = '<option value="">Selecione...</option>' +
        categorias.map((c) => '<option value="' + c.id + '">' + UI.escapar(c.nome) + '</option>').join('');
      if (selecionadaId) $('m_categoria').value = selecionadaId;
    }

    function dataBr(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR');
    }

    async function carregar() {
      const [produto, ultima] = await Promise.all([
        API.get('/api/produtos/' + produtoId),
        API.get('/api/produtos/' + produtoId + '/ultima-compra'),
      ]);
      await carregarCategorias(produto.categoriaId);

      $('subtituloProduto').textContent = produto.nome + ' · EAN ' + produto.ean;

      // Aba 1
      $('m_nome').value = produto.nome || '';
      $('m_unidade').value = produto.unidade || 'UN';
      $('m_marca').value = produto.marca || '';
      // Aba 2 — mostra o código já salvo como texto inicial (sem a
      // descrição, que exigiria uma busca extra); re-buscar/reselecionar só
      // é necessário se o usuário quiser trocar o código.
      seletorNcm.definir(produto.ncm, produto.ncm || '');
      $('m_configTrib').value = produto.configTributaria || '';
      seletorCfop.definir(produto.cfop, produto.cfop || '');
      $('m_origem').value = produto.origem || '';
      seletorCstIbsCbs.definir(produto.cstIbsCbs, produto.cstIbsCbs || '');
      seletorClassTrib.definir(produto.cClassTrib, produto.cClassTrib || '');
      // Aba 3 (somente leitura)
      $('m_estoqueTotal').value = produto.estoqueQtd + ' ' + (produto.unidade || '');
      $('m_ultPreco').value = ultima.preco != null ? UI.moeda(ultima.preco) : 'Sem compras registradas';
      $('m_ultFornecedor').value = ultima.fornecedor || '-';
      $('m_ultData').value = dataBr(ultima.data);
      $('m_permiteNegativo').checked = produto.permiteEstoqueNegativo !== false;
      $('m_controlaLote').checked = !!produto.controlaLote;
      // Preços
      precoMedioNum = Number(produto.custoMedio || 0);
      $('m_precoMedio').value = UI.moeda(produto.custoMedio);
      $('m_precoAtual').value = ultima.preco != null ? UI.moeda(ultima.preco) : 'Sem compras registradas';
      $('m_precoVenda').value = produto.preco || '';
      $('m_markupAtual').value = precoMedioNum > 0 && produto.preco
        ? ((Number(produto.preco) / precoMedioNum - 1) * 100).toFixed(1).replace('.', ',') + '%'
        : '-';
      // Sem preço médio (nenhuma compra) não há base para calcular o markup.
      if (!(precoMedioNum > 0)) $('m_markupDesejado').disabled = true;
      // Códigos
      $('m_ean').value = produto.ean || '';
      $('m_codRef').value = produto.codigoReferencia || '';
    }

    /**
     * Valida todos os campos de todas as abas de uma vez. Retorna a lista de
     * erros com a aba de origem; a primeira aba com erro é aberta pro usuário.
     */
    function validar() {
      const erros = [];
      document.querySelectorAll('.campo.invalido').forEach((c) => c.classList.remove('invalido'));
      const invalido = (id, aba, msg) => {
        $(id).closest('.campo').classList.add('invalido');
        erros.push({ aba, msg });
      };

      if ($('m_nome').value.trim().length < 2) invalido('m_nome', 'cadastrais', 'Nome é obrigatório (mínimo 2 caracteres)');
      if (!$('m_categoria').value) invalido('m_categoria', 'cadastrais', 'Grupo é obrigatório');
      if (!$('m_unidade').value) invalido('m_unidade', 'cadastrais', 'Unidade é obrigatória');

      // NCM/CFOP/CST-IBS-CBS/cClassTrib são obrigatórios (exigência nova —
      // ver produto.validator.js): só chegam aqui com um código real do
      // catálogo (seletorX.obter()), nunca texto livre digitado sem
      // selecionar (ver criarSeletorCatalogo). obter() null cobre os dois
      // casos de erro (campo vazio ou texto digitado sem clicar numa
      // sugestão) — a mensagem já deixa claro que precisa ser preenchido.
      if (!seletorNcm.obter()) invalido('m_ncm', 'tributarias', 'NCM é obrigatório: selecione um código do catálogo (exigência nova de classificação fiscal completa)');
      if (!seletorCfop.obter()) invalido('m_cfop', 'tributarias', 'CFOP é obrigatório: selecione um código do catálogo (exigência nova de classificação fiscal completa)');
      if (!seletorCstIbsCbs.obter()) invalido('m_cstIbsCbs', 'tributarias', 'CST-IBS/CBS é obrigatório: selecione um código do catálogo (exigência nova de classificação fiscal completa)');
      if (!seletorClassTrib.obter()) invalido('m_classTrib', 'tributarias', 'cClassTrib é obrigatório: selecione um código do catálogo (exigência nova de classificação fiscal completa)');

      const precoVenda = Number($('m_precoVenda').value);
      if (!$('m_precoVenda').value || !(precoVenda > 0)) invalido('m_precoVenda', 'precos', 'Preço atual (venda) é obrigatório e deve ser maior que zero');

      const ean = $('m_ean').value.trim();
      if (!/^\d{8}$|^\d{12,14}$/.test(ean)) invalido('m_ean', 'codigos', 'EAN é obrigatório (8, 12, 13 ou 14 dígitos numéricos)');

      // Marca nas abas os erros (painéis Preços/Códigos estão sempre visíveis).
      document.querySelectorAll('.abas button').forEach((b) => b.classList.toggle('com-erro', erros.some((e) => e.aba === b.dataset.aba)));
      return erros;
    }

    async function salvar() {
      UI.limparErro(erroGeral);
      const erros = validar();
      if (erros.length) {
        erroGeral.innerHTML = 'Corrija antes de salvar:<br>' +
          erros.map((e) => '· <strong>' + ABAS_ROTULO[e.aba] + '</strong>: ' + UI.escapar(e.msg)).join('<br>');
        erroGeral.classList.add('visivel');
        const primeiraAbaComErro = erros.find((e) => ABAS_ROTULO[e.aba] && document.querySelector('.abas button[data-aba="' + e.aba + '"]'));
        if (primeiraAbaComErro) trocarAba(primeiraAbaComErro.aba);
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      const body = {
        nome: $('m_nome').value.trim(),
        categoriaId: $('m_categoria').value,
        unidade: $('m_unidade').value,
        marca: $('m_marca').value.trim(),
        ncm: seletorNcm.obter() || '',
        configTributaria: $('m_configTrib').value,
        cfop: seletorCfop.obter() || '',
        origem: $('m_origem').value,
        cstIbsCbs: seletorCstIbsCbs.obter() || '',
        cClassTrib: seletorClassTrib.obter() || '',
        preco: $('m_precoVenda').value, // preço de venda vigente (o PDV usa este)
        ean: $('m_ean').value.trim(),
        codigoReferencia: $('m_codRef').value.trim(),
        permiteEstoqueNegativo: $('m_permiteNegativo').checked,
        controlaLote: $('m_controlaLote').checked,
      };

      const btn = $('btnSalvar');
      btn.disabled = true; btn.textContent = 'Salvando...';
      try {
        await API.put('/api/produtos/' + produtoId, body);
        // Permanece na página com os dados salvos visíveis — sem redirect.
        mostrarToast('Salvo com sucesso');
      } catch (e) {
        UI.erro(erroGeral, e);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } finally {
        btn.disabled = false; btn.textContent = 'Salvar';
      }
    }

    // Mão dupla markup ↔ preço: digitar o markup desejado calcula o preço de
    // venda sobre o preço médio; digitar o preço recalcula o markup. Setar
    // .value via código não dispara 'input', então não há loop.
    $('m_markupDesejado').addEventListener('input', () => {
      const mk = Number($('m_markupDesejado').value);
      if (!(precoMedioNum > 0) || $('m_markupDesejado').value === '' || Number.isNaN(mk)) return;
      $('m_precoVenda').value = (precoMedioNum * (1 + mk / 100)).toFixed(2);
    });
    $('m_precoVenda').addEventListener('input', () => {
      const preco = Number($('m_precoVenda').value);
      if (!(precoMedioNum > 0) || !(preco > 0)) return;
      $('m_markupDesejado').value = ((preco / precoMedioNum - 1) * 100).toFixed(1);
    });

    $('btnSalvar').addEventListener('click', salvar);
    $('btnCancelar').addEventListener('click', () => { window.location.href = 'produtos.html'; });

    (async () => {
      if (!produtoId) { window.location.href = 'produtos.html'; return; }
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      await Auth.montarSidebar('produtos.html');
      try {
        await carregar();
      } catch (e) {
        UI.erro(erroGeral, e);
      }
    })();
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Usuários</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Usuários</h1>
      </div>

      <div class="barra-acoes">
        <button class="btn" id="btnNovoUsuario">Novo usuário</button>
      </div>

      <div class="painel">
        <table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Criado em</th><th></th></tr></thead>
          <tbody id="tabela"><tr><td colspan="5" class="vazio">Carregando...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-fundo" id="modalUsuario">
    <div class="modal">
      <h2 id="tituloModal">Novo usuário</h2>
      <div id="erroModal" class="msg-erro"></div>
      <div class="form-grid">
        <div class="campo cheio"><label>Nome *</label><input id="f_nome" maxlength="120"></div>
        <div class="campo"><label>E-mail *</label><input id="f_email" type="email"></div>
        <div class="campo"><label>Perfil *</label>
          <select id="f_perfil"></select>
        </div>
        <div class="campo cheio"><label id="rotuloSenha">Senha * (mínimo 6 caracteres)</label><input id="f_senha" type="password"></div>
      </div>
      <div class="rodape">
        <button class="btn secundario" id="btnCancelarUsuario">Cancelar</button>
        <button class="btn" id="btnSalvar">Salvar</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
  (() => {
    initNavbar();
    let editandoId = null;
    let perfisDisponiveis = [];
    // Usuários carregados, indexados por id (evita serializar objetos no HTML).
    const usuariosCarregados = new Map();

    async function carregarPerfis() {
      const data = await API.get('/api/perfis?limit=100');
      perfisDisponiveis = data.items;
      document.getElementById('f_perfil').innerHTML = perfisDisponiveis
        .map((p) => '<option value="' + p.id + '">' + UI.escapar(p.nome) + '</option>')
        .join('');
    }

    async function carregar() {
      const data = await API.get('/api/usuarios?limit=100');
      const corpo = document.getElementById('tabela');
      usuariosCarregados.clear();
      data.items.forEach((u) => usuariosCarregados.set(u.id, u));
      corpo.innerHTML = data.items.map((u) => {
        const rotuloPerfil = u.isDono ? 'Dono' : (u.perfil ? u.perfil.nome : '-');
        const acoes = u.isDono
          ? '<span class="tag neutro">acesso total</span>'
          : '<button class="btn secundario pequeno" data-acao="editar" data-id="' + u.id + '">Editar</button> ' +
            '<button class="btn perigo pequeno" data-acao="remover" data-id="' + u.id + '">Desativar</button>';
        return '<tr><td>' + UI.escapar(u.nome) + '</td><td>' + UI.escapar(u.email) + '</td>' +
          '<td><span class="tag neutro">' + UI.escapar(rotuloPerfil) + '</span></td><td>' + UI.data(u.criadoEm) + '</td>' +
          '<td>' + acoes + '</td></tr>';
      }).join('');
    }

    function abrirNovo() {
      editandoId = null;
      document.getElementById('tituloModal').textContent = 'Novo usuário';
      document.getElementById('rotuloSenha').textContent = 'Senha * (mínimo 6 caracteres)';
      document.getElementById('erroModal').classList.remove('visivel');
      ['f_nome', 'f_email', 'f_senha'].forEach((id) => document.getElementById(id).value = '');
      UI.abrirModal('modalUsuario');
    }

    function editar(u) {
      editandoId = u.id;
      document.getElementById('tituloModal').textContent = 'Editar usuário';
      document.getElementById('rotuloSenha').textContent = 'Nova senha (deixe em branco para manter)';
      document.getElementById('erroModal').classList.remove('visivel');
      document.getElementById('f_nome').value = u.nome;
      document.getElementById('f_email').value = u.email;
      document.getElementById('f_perfil').value = u.perfil ? u.perfil.id : '';
      document.getElementById('f_senha').value = '';
      UI.abrirModal('modalUsuario');
    }

    async function salvar() {
      const erroEl = document.getElementById('erroModal');
      erroEl.classList.remove('visivel');
      const body = {
        nome: document.getElementById('f_nome').value.trim(),
        email: document.getElementById('f_email').value.trim(),
        perfilId: document.getElementById('f_perfil').value,
      };
      const senha = document.getElementById('f_senha').value;
      if (senha || !editandoId) body.senha = senha;
      try {
        if (editandoId) await API.put('/api/usuarios/' + editandoId, body);
        else await API.post('/api/usuarios', body);
        UI.fecharModal('modalUsuario');
        carregar();
      } catch (e) {
        erroEl.textContent = e.message + (e.errors && e.errors.length ? ': ' + e.errors.join('; ') : '');
        erroEl.classList.add('visivel');
      }
    }

    async function remover(id) {
      if (!confirm('Desativar este usuário? Ele perderá o acesso ao sistema.')) return;
      try { await API.del('/api/usuarios/' + id); carregar(); } catch (e) { alert(e.message); }
    }

    // ─── Eventos ───
    document.getElementById('btnNovoUsuario').addEventListener('click', abrirNovo);
    document.getElementById('btnCancelarUsuario').addEventListener('click', () => UI.fecharModal('modalUsuario'));
    document.getElementById('btnSalvar').addEventListener('click', salvar);
    document.getElementById('tabela').addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-acao]');
      if (!btn) return;
      if (btn.dataset.acao === 'editar') {
        const u = usuariosCarregados.get(btn.dataset.id);
        if (u) editar(u);
      }
      if (btn.dataset.acao === 'remover') remover(btn.dataset.id);
    });

    (async () => {
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      const permissaoUsuarios = usuario.permissoes && usuario.permissoes.usuarios;
      if (!usuario.isDono && (!permissaoUsuarios || permissaoUsuarios === 'bloqueado')) {
        window.location.href = '/index.html';
        return;
      }
      await Auth.montarSidebar('usuarios.html');
      await carregarPerfis();
      carregar();
    })();
  })();
  </script>
</body>
</html>

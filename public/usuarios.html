<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Usuários</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Usuários</h1>
      </div>

      <div class="barra-acoes">
        <button class="btn" id="btnNovoUsuario">Novo usuário</button>
      </div>

      <div class="painel">
        <table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Criado em</th><th></th></tr></thead>
          <tbody id="tabela"><tr><td colspan="5" class="vazio">Carregando...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-fundo" id="modalUsuario">
    <div class="modal">
      <h2 id="tituloModal">Novo usuário</h2>
      <div id="erroModal" class="msg-erro"></div>
      <div class="form-grid">
        <div class="campo cheio"><label>Nome *</label><input id="f_nome" maxlength="120"></div>
        <div class="campo"><label>E-mail *</label><input id="f_email" type="email"></div>
        <div class="campo"><label>Perfil *</label>
          <select id="f_perfil"></select>
        </div>
        <div class="campo cheio"><label id="rotuloSenha">Senha * (mínimo 6 caracteres)</label><input id="f_senha" type="password"></div>
      </div>
      <div class="rodape">
        <button class="btn secundario" id="btnCancelarUsuario">Cancelar</button>
        <button class="btn" id="btnSalvar">Salvar</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/toast.js"></script>
  <script>
  (() => {
    initNavbar();
    let editandoId = null;
    let perfisDisponiveis = [];
    // Usuários carregados, indexados por id (evita serializar objetos no HTML).
    const usuariosCarregados = new Map();

    // Referências capturadas na injeção do script: se o usuário navegar para
    // outra página antes de um fetch terminar, buscar por id retornaria null;
    // nos elementos órfãos a escrita tardia é um no-op inofensivo.
    const $ = (id) => document.getElementById(id);
    const tabela = $('tabela'), tituloModal = $('tituloModal'), erroModal = $('erroModal'),
          rotuloSenha = $('rotuloSenha'), fPerfil = $('f_perfil');
    const fNome = $('f_nome'), fEmail = $('f_email'), fSenha = $('f_senha');

    async function carregarPerfis() {
      const data = await API.get('/api/perfis?limit=100');
      perfisDisponiveis = data.items;
      fPerfil.innerHTML = perfisDisponiveis
        .map((p) => '<option value="' + p.id + '">' + UI.escapar(p.nome) + '</option>')
        .join('');
    }

    async function carregar() {
      const data = await API.get('/api/usuarios?limit=100');
      usuariosCarregados.clear();
      data.items.forEach((u) => usuariosCarregados.set(u.id, u));
      tabela.innerHTML = data.items.map((u) => {
        const rotuloPerfil = u.isDono ? 'Dono' : (u.perfil ? u.perfil.nome : '-');
        const acoes = u.isDono
          ? '<span class="tag neutro">acesso total</span>'
          : '<button class="btn secundario pequeno" data-acao="editar" data-id="' + u.id + '">Editar</button> ' +
            '<button class="btn perigo pequeno" data-acao="remover" data-id="' + u.id + '">Desativar</button>';
        return '<tr><td>' + UI.escapar(u.nome) + '</td><td>' + UI.escapar(u.email) + '</td>' +
          '<td><span class="tag neutro">' + UI.escapar(rotuloPerfil) + '</span></td><td>' + UI.data(u.criadoEm) + '</td>' +
          '<td>' + acoes + '</td></tr>';
      }).join('');
    }

    function abrirNovo() {
      editandoId = null;
      tituloModal.textContent = 'Novo usuário';
      rotuloSenha.textContent = 'Senha * (mínimo 6 caracteres)';
      UI.limparErro(erroModal);
      [fNome, fEmail, fSenha].forEach((campo) => campo.value = '');
      UI.abrirModal('modalUsuario');
    }

    function editar(u) {
      editandoId = u.id;
      tituloModal.textContent = 'Editar usuário';
      rotuloSenha.textContent = 'Nova senha (deixe em branco para manter)';
      UI.limparErro(erroModal);
      fNome.value = u.nome;
      fEmail.value = u.email;
      fPerfil.value = u.perfil ? u.perfil.id : '';
      fSenha.value = '';
      UI.abrirModal('modalUsuario');
    }

    async function salvar() {
      UI.limparErro(erroModal);
      const body = {
        nome: fNome.value.trim(),
        email: fEmail.value.trim(),
        perfilId: fPerfil.value,
      };
      const senha = fSenha.value;
      if (senha || !editandoId) body.senha = senha;
      try {
        if (editandoId) await API.put('/api/usuarios/' + editandoId, body);
        else await API.post('/api/usuarios', body);
        UI.fecharModal('modalUsuario');
        carregar();
      } catch (e) {
        UI.erro(erroModal, e);
      }
    }

    function remover(id) {
      return UI.confirmarAcao('Desativar este usuário? Ele perderá o acesso ao sistema.', async () => {
        await API.del('/api/usuarios/' + id);
        carregar();
      });
    }

    // ─── Eventos ───
    $('btnNovoUsuario').addEventListener('click', abrirNovo);
    $('btnCancelarUsuario').addEventListener('click', () => UI.fecharModal('modalUsuario'));
    $('btnSalvar').addEventListener('click', salvar);
    tabela.addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-acao]');
      if (!btn) return;
      if (btn.dataset.acao === 'editar') {
        const u = usuariosCarregados.get(btn.dataset.id);
        if (u) editar(u);
      }
      if (btn.dataset.acao === 'remover') remover(btn.dataset.id);
    });

    (async () => {
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      const permissaoUsuarios = usuario.permissoes && usuario.permissoes.usuarios;
      if (!usuario.isDono && (!permissaoUsuarios || permissaoUsuarios === 'bloqueado')) {
        window.location.href = '/index.html';
        return;
      }
      await Auth.montarSidebar('usuarios.html');
      await carregarPerfis();
      carregar();
    })();
  })();
  </script>
</body>
</html>

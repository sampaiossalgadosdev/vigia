<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Perfis</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Perfis</h1>
      </div>

      <div class="barra-acoes">
        <button class="btn" id="btnNovoPerfil">Novo perfil</button>
      </div>

      <div class="painel">
        <table>
          <thead><tr><th>Nome</th><th>Descrição</th><th>Usuários</th><th></th></tr></thead>
          <tbody id="tabela"><tr><td colspan="4" class="vazio">Carregando...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-fundo" id="modalPerfil">
    <div class="modal" style="max-width: 760px">
      <h2 id="tituloModal">Novo perfil</h2>
      <div id="erroModal" class="msg-erro"></div>
      <div class="form-grid">
        <div class="campo cheio"><label>Nome *</label><input id="f_nome" maxlength="80"></div>
        <div class="campo cheio"><label>Descrição</label><input id="f_descricao" maxlength="255"></div>
      </div>

      <div style="overflow-x:auto; margin-top: 10px">
        <table>
          <thead>
            <tr>
              <th>Módulo</th>
              <th>Acesso completo</th>
              <th>Edição e leitura</th>
              <th>Somente inserção</th>
              <th>Somente leitura</th>
              <th>Bloqueado</th>
            </tr>
          </thead>
          <tbody id="matrizPermissoes"></tbody>
        </table>
      </div>

      <div class="rodape">
        <button class="btn secundario" id="btnCancelarPerfil">Cancelar</button>
        <button class="btn" id="btnSalvar">Salvar</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
  (() => {
    initNavbar();
    let editandoId = null;

    // Referências capturadas na injeção do script: se o usuário navegar para
    // outra página antes de um fetch terminar, buscar por id retornaria null;
    // nos elementos órfãos a escrita tardia é um no-op inofensivo.
    const $ = (id) => document.getElementById(id);
    const tabela = $('tabela'), tituloModal = $('tituloModal'), erroModal = $('erroModal'),
          matrizPermissoes = $('matrizPermissoes'), fNome = $('f_nome'), fDescricao = $('f_descricao');

    const MODULOS = [
      ['dashboard', 'Dashboard'],
      ['produtos', 'Produtos'],
      ['fornecedores', 'Fornecedores'],
      ['estoque', 'Estoque / NF-e'],
      ['vendas', 'Vendas'],
      ['promocoes', 'Promoções'],
      ['caixa', 'Caixa'],
      ['relatorios', 'Relatórios'],
      ['ia', 'IA'],
      ['usuarios', 'Usuários'],
      ['perfis', 'Perfis'],
    ];
    const NIVEIS = ['acesso_completo', 'edicao_leitura', 'somente_insercao', 'somente_leitura', 'bloqueado'];

    function montarMatriz(permissoesAtuais) {
      const mapa = {};
      (permissoesAtuais || []).forEach((p) => { mapa[p.modulo] = p.nivel; });
      matrizPermissoes.innerHTML = MODULOS.map(([modulo, rotulo]) => {
        const nivelAtual = mapa[modulo] || 'bloqueado';
        const celulas = NIVEIS.map((nivel) =>
          '<td style="text-align:center"><input type="radio" name="mod_' + modulo + '" value="' + nivel + '"' +
          (nivel === nivelAtual ? ' checked' : '') + '></td>'
        ).join('');
        return '<tr><td>' + UI.escapar(rotulo) + '</td>' + celulas + '</tr>';
      }).join('');
    }

    function lerMatriz() {
      return MODULOS.map(([modulo]) => {
        const marcado = document.querySelector('input[name="mod_' + modulo + '"]:checked');
        return { modulo, nivel: marcado ? marcado.value : 'bloqueado' };
      });
    }

    async function carregar() {
      const data = await API.get('/api/perfis?limit=100');
      if (!data.items.length) {
        tabela.innerHTML = '<tr><td colspan="4" class="vazio">Nenhum perfil cadastrado.</td></tr>';
        return;
      }
      tabela.innerHTML = data.items.map((p) =>
        '<tr><td>' + UI.escapar(p.nome) + '</td><td>' + UI.escapar(p.descricao || '-') + '</td>' +
        '<td>' + p.totalUsuarios + '</td>' +
        '<td><button class="btn secundario pequeno" data-acao="editar" data-id="' + p.id + '">Editar</button> ' +
        '<button class="btn perigo pequeno" data-acao="remover" data-id="' + p.id + '">Excluir</button></td></tr>'
      ).join('');
    }

    function abrirNovo() {
      editandoId = null;
      tituloModal.textContent = 'Novo perfil';
      erroModal.classList.remove('visivel');
      fNome.value = '';
      fDescricao.value = '';
      montarMatriz([]);
      UI.abrirModal('modalPerfil');
    }

    async function editar(id) {
      const perfil = await API.get('/api/perfis/' + id);
      editandoId = perfil.id;
      tituloModal.textContent = 'Editar perfil';
      erroModal.classList.remove('visivel');
      fNome.value = perfil.nome;
      fDescricao.value = perfil.descricao || '';
      montarMatriz(perfil.permissoes);
      UI.abrirModal('modalPerfil');
    }

    async function salvar() {
      erroModal.classList.remove('visivel');
      const body = {
        nome: fNome.value.trim(),
        descricao: fDescricao.value.trim(),
        permissoes: lerMatriz(),
      };
      try {
        if (editandoId) await API.put('/api/perfis/' + editandoId, body);
        else await API.post('/api/perfis', body);
        UI.fecharModal('modalPerfil');
        carregar();
      } catch (e) {
        erroModal.textContent = e.message + (e.errors && e.errors.length ? ': ' + e.errors.join('; ') : '');
        erroModal.classList.add('visivel');
      }
    }

    async function remover(id) {
      if (!confirm('Excluir este perfil? Usuários vinculados a ele impedem a exclusão.')) return;
      try { await API.del('/api/perfis/' + id); carregar(); } catch (e) { alert(e.message); }
    }

    // ─── Eventos ───
    $('btnNovoPerfil').addEventListener('click', abrirNovo);
    $('btnCancelarPerfil').addEventListener('click', () => UI.fecharModal('modalPerfil'));
    $('btnSalvar').addEventListener('click', salvar);
    tabela.addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-acao]');
      if (!btn) return;
      if (btn.dataset.acao === 'editar') editar(btn.dataset.id);
      if (btn.dataset.acao === 'remover') remover(btn.dataset.id);
    });

    (async () => {
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      const permissaoPerfis = usuario.permissoes && usuario.permissoes.perfis;
      if (!usuario.isDono && (!permissaoPerfis || permissaoPerfis === 'bloqueado')) {
        window.location.href = '/index.html';
        return;
      }
      await Auth.montarSidebar('perfis.html');
      carregar();
    })();
  })();
  </script>
</body>
</html>

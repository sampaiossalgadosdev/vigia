<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Promoções</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Promoções</h1>
      </div>
      <div class="barra-acoes">
        <button class="btn" onclick="abrirNova()">Nova promoção</button>
      </div>
      <div class="painel">
        <table>
          <thead><tr><th>Produto</th><th>Tipo</th><th>Desconto</th><th>Período</th><th>Status</th><th></th></tr></thead>
          <tbody id="tabelaPromocoes"><tr><td colspan="6" class="vazio">Carregando...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
  <div class="modal-fundo" id="modalPromocao">
    <div class="modal">
      <h2>Nova promoção</h2>
      <div class="form-grid">
        <div class="campo cheio"><label>Produto</label><input id="f_produto" placeholder="Nome ou EAN"></div>
        <div class="campo"><label>Tipo</label><select id="f_tipo"><option value="percentual">Percentual</option><option value="valor_fixo">Valor fixo</option><option value="leve_pague">Leve/pague</option></select></div>
        <div class="campo"><label>Desconto</label><input id="f_desconto" type="number" step="0.01"></div>
        <div class="campo"><label>Data início</label><input id="f_inicio" type="date"></div>
        <div class="campo"><label>Data fim</label><input id="f_fim" type="date"></div>
        <div class="campo"><label>Leve qtd</label><input id="f_leve" type="number"></div>
        <div class="campo"><label>Pague qtd</label><input id="f_pague" type="number"></div>
      </div>
      <div class="rodape"><button class="btn secundario" onclick="UI.fecharModal('modalPromocao')">Cancelar</button><button class="btn" onclick="salvar()">Salvar</button></div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    initNavbar();
    let produtoSelecionado = null;
    async function carregar() {
      const data = await API.get('/api/promocoes');
      const corpo = document.getElementById('tabelaPromocoes');
      if (!data.items.length) { corpo.innerHTML = '<tr><td colspan="6" class="vazio">Nenhuma promoção cadastrada.</td></tr>'; return; }
      corpo.innerHTML = data.items.map((p) => '<tr><td>' + UI.escapar(p.produto?.nome || '-') + '</td><td>' + p.tipo + '</td><td>' + p.desconto + '</td><td>' + UI.data(p.dataInicio) + ' a ' + UI.data(p.dataFim) + '</td><td><span class="tag ' + (p.ativa ? 'ok' : 'neutro') + '">' + (p.ativa ? 'ativa' : 'encerrada') + '</span></td><td><button class="btn secundario pequeno" onclick="encerrar(\'' + p.id + '\')">Encerrar</button></td></tr>').join('');
    }
    function abrirNova() { UI.abrirModal('modalPromocao'); }
    async function salvar() {
      const body = { produtoId: produtoSelecionado?.id || document.getElementById('f_produto').value, nome: 'Promoção', tipo: document.getElementById('f_tipo').value, desconto: document.getElementById('f_desconto').value, dataInicio: document.getElementById('f_inicio').value, dataFim: document.getElementById('f_fim').value, leveQtd: document.getElementById('f_leve').value || null, pagueQtd: document.getElementById('f_pague').value || null };
      await API.post('/api/promocoes', body);
      UI.fecharModal('modalPromocao');
      await carregar();
    }
    async function encerrar(id) { await API.del('/api/promocoes/' + id); await carregar(); }
    (async () => {
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      await Auth.montarSidebar('promocoes.html');
      await carregar();
    })();
  </script>
</body>
</html>

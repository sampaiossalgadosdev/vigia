<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Promoções</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Promoções</h1>
      </div>
      <div class="barra-acoes">
        <button class="btn" id="btnNovaPromocao">Nova promoção</button>
      </div>
      <div class="painel">
        <table>
          <thead><tr><th>Produto</th><th>Tipo</th><th>Desconto</th><th>Período</th><th>Status</th><th></th></tr></thead>
          <tbody id="tabelaPromocoes"><tr><td colspan="6" class="vazio">Carregando...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
  <div class="modal-fundo" id="modalPromocao">
    <div class="modal">
      <h2>Nova promoção</h2>
      <div class="form-grid">
        <div class="campo cheio" style="position:relative">
          <label>Produto</label>
          <input id="f_produto" placeholder="Digite o nome ou EAN..." autocomplete="off">
          <div class="sugestoes" id="sugestoesProduto" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--linha);border-radius:6px;z-index:50;display:none;max-height:180px;overflow-y:auto;box-shadow:0 4px 10px rgba(0,0,0,.12)"></div>
        </div>
        <div class="campo"><label>Tipo</label><select id="f_tipo"><option value="percentual">Percentual</option><option value="valor_fixo">Valor fixo</option><option value="leve_pague">Leve/pague</option></select></div>
        <div class="campo"><label>Desconto</label><input id="f_desconto" type="number" step="0.01"></div>
        <div class="campo"><label>Data início</label><input id="f_inicio" type="date"></div>
        <div class="campo"><label>Data fim</label><input id="f_fim" type="date"></div>
        <div class="campo"><label>Leve qtd</label><input id="f_leve" type="number"></div>
        <div class="campo"><label>Pague qtd</label><input id="f_pague" type="number"></div>
      </div>
      <p class="msg-erro" id="erroPromocao"></p>
      <div class="rodape"><button class="btn secundario" id="btnCancelarPromocao">Cancelar</button><button class="btn" id="btnSalvar">Salvar</button></div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/toast.js"></script>
  <script>
  (() => {
    initNavbar();
    let produtoSelecionado = null;
    // Referências capturadas na injeção do script: se o usuário navegar para
    // outra página antes de um fetch terminar, buscar por id retornaria null;
    // nos elementos órfãos a escrita tardia é um no-op inofensivo.
    const $ = (id) => document.getElementById(id);
    const tabelaPromocoes = $('tabelaPromocoes');
    const fProduto = $('f_produto'), fTipo = $('f_tipo'), fDesconto = $('f_desconto'),
          fInicio = $('f_inicio'), fFim = $('f_fim'), fLeve = $('f_leve'), fPague = $('f_pague'),
          sugestoesProduto = $('sugestoesProduto'), erroPromocao = $('erroPromocao');

    function debounce(fn, ms) {
      let temporizador;
      return (...args) => { clearTimeout(temporizador); temporizador = setTimeout(() => fn(...args), ms); };
    }

    async function carregar() {
      const data = await API.get('/api/promocoes');
      if (!data.items.length) { tabelaPromocoes.innerHTML = '<tr><td colspan="6" class="vazio">Nenhuma promoção cadastrada.</td></tr>'; return; }
      tabelaPromocoes.innerHTML = data.items.map((p) => '<tr><td>' + UI.escapar(p.produto?.nome || '-') + '</td><td>' + p.tipo + '</td><td>' + p.desconto + '</td><td>' + UI.data(p.dataInicio) + ' a ' + UI.data(p.dataFim) + '</td><td><span class="tag ' + (p.ativa ? 'ok' : 'neutro') + '">' + (p.ativa ? 'ativa' : 'encerrada') + '</span></td><td><button class="btn secundario pequeno" data-acao="encerrar" data-id="' + p.id + '">Encerrar</button></td></tr>').join('');
    }

    // Busca real de produto (nome/EAN) — sem isso, produtoId ia como o texto
    // livre digitado, nunca um id de verdade (bug original: toda criação
    // batia em violação de foreign key ou, se o campo ficasse vazio, no
    // fallback abaixo).
    const buscarProdutos = debounce(async () => {
      const termo = fProduto.value.trim();
      if (termo.length < 2) { sugestoesProduto.style.display = 'none'; return; }
      try {
        const produtos = await API.get('/api/promocoes/produtos/busca?termo=' + encodeURIComponent(termo));
        sugestoesProduto.innerHTML = produtos.length
          ? produtos.map((p) => '<div class="sugestao" data-id="' + p.id + '" data-nome="' + UI.escapar(p.nome) + '" style="padding:8px 12px;cursor:pointer">' + UI.escapar(p.nome) + (p.ean ? ' <small style="color:var(--cinza)">(' + UI.escapar(p.ean) + ')</small>' : '') + '</div>').join('')
          : '<div style="padding:8px 12px;color:var(--cinza)">Nenhum produto encontrado</div>';
        sugestoesProduto.style.display = 'block';
      } catch (e) { sugestoesProduto.style.display = 'none'; }
    }, 300);

    function limparSelecaoProduto() {
      produtoSelecionado = null;
      fProduto.value = '';
      sugestoesProduto.style.display = 'none';
    }

    function abrirNovaPromocao() {
      limparSelecaoProduto();
      UI.limparErro(erroPromocao);
      UI.abrirModal('modalPromocao');
    }

    async function salvar() {
      UI.limparErro(erroPromocao);
      if (!produtoSelecionado) return UI.erro(erroPromocao, 'Busque e selecione um produto na lista antes de salvar.');
      const body = {
        produtoId: produtoSelecionado.id,
        nome: 'Promoção',
        tipo: fTipo.value,
        desconto: Number(fDesconto.value),
        dataInicio: fInicio.value,
        dataFim: fFim.value,
        // Number(''): NaN — só entram como número quando de fato preenchidos;
        // vazio vira null (era o bug original: string "1"/"" ia direto pro
        // Prisma, que rejeita string num campo Int).
        leveQtd: fLeve.value ? Number(fLeve.value) : null,
        pagueQtd: fPague.value ? Number(fPague.value) : null,
      };
      try {
        await API.post('/api/promocoes', body);
        UI.fecharModal('modalPromocao');
        await carregar();
      } catch (e) {
        UI.erro(erroPromocao, e);
      }
    }
    async function encerrar(id) { await API.del('/api/promocoes/' + id); await carregar(); }
    $('btnNovaPromocao').addEventListener('click', abrirNovaPromocao);
    $('btnCancelarPromocao').addEventListener('click', () => UI.fecharModal('modalPromocao'));
    $('btnSalvar').addEventListener('click', salvar);
    fProduto.addEventListener('input', () => { produtoSelecionado = null; buscarProdutos(); });
    sugestoesProduto.addEventListener('click', (ev) => {
      const sugestao = ev.target.closest('.sugestao[data-id]');
      if (!sugestao) return;
      produtoSelecionado = { id: sugestao.dataset.id, nome: sugestao.dataset.nome };
      fProduto.value = sugestao.dataset.nome;
      sugestoesProduto.style.display = 'none';
    });
    tabelaPromocoes.addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-acao="encerrar"]');
      if (btn) encerrar(btn.dataset.id);
    });
    (async () => {
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      await Auth.montarSidebar('promocoes.html');
      await carregar();
    })();
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>VIGIA · Açougue TV</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /*
     * Tela da TV do açougue (aberta pelo link gerado no painel Açougue TV).
     * Mantém o layout original do AçougueTV: lista de carnes à esquerda e
     * carrossel de destaques à direita, sobrepostos à arte de fundo.
     */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Oswald', sans-serif;
    }

    /* O cursor só some quando a TV está conectada e exibindo as carnes */
    body.conectado { cursor: none; }

    .tv-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ===== ÁREA DA LISTA (esquerda) ===== */
    /* Posicionado sobre o painel escuro esquerdo da imagem */
    .lista-carnes {
      position: absolute;
      left: 5%;
      top: 33.5%;
      width: 34%;
      height: 50%;
      overflow: hidden;
    }

    .lista-wrapper {
      width: 100%;
      will-change: transform;
      display: flex;
      flex-direction: column;
      gap: 1vh; /* ← altere aqui o espaçamento entre os itens */
    }

    .lista-wrapper.scrolling {
      animation: scrollUp linear infinite;
    }

    @keyframes scrollUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    .carne-item {
      display: flex;
      align-items: center;
      padding: 0.6vh 0.8vw;
      gap: 0.5vw;
    }

    .carne-icone {
      flex-shrink: 0;
      width: 2.2vh;
      height: 2.2vh;
      opacity: 0.85;
    }

    .carne-nome {
      flex: 1;
      font-family: 'Oswald', sans-serif;
      font-size: 3.5vh;
      font-weight: 600;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .carne-preco-area {
      flex-shrink: 0;
      display: flex;
      align-items: baseline;
      gap: 0.15vw;
      white-space: nowrap;
    }

    .carne-rs {
      font-size: 2.5vh;
      color: #dddddd;
      font-weight: 400;
    }

    .carne-valor {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4vh;
      color: #f0c040;
      line-height: 1;
      letter-spacing: 0.5px;
    }

    .carne-kg {
      font-size: 2.5vh;
      color: #dddddd;
      font-weight: 400;
    }

    /* ===== ÁREA DO DESTAQUE (direita) ===== */
    /* Posicionado sobre o painel direito da imagem */
    .destaque-area {
      position: absolute;
      left: 33%;
      top: 22%;
      width: 63%;
      height: 66%;
      max-height: 70%;
    }

    .destaque-foto {
      position: absolute;
      top: 20.5%;
      left: 18.1%;
      width: 81%;
      height: 68%;
      object-fit: cover;
      border-radius: 1.5vw;
      object-position: center;
      transition: opacity 0.5s ease;
    }

    /* Overlay com informações no canto superior direito */
    .destaque-info {
      position: absolute;
      margin-top: 13%;
      right: 3%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5vh;
      z-index: 2;
      transition: opacity 0.5s ease;
    }

    .destaque-nome-badge {
      background: linear-gradient(135deg, #0d2d6e, #1a4aaa);
      border: 2px solid #2a6aee;
      border-radius: 0.5vw;
      padding: 0.5vh 1.2vw;
      text-align: center;
      min-width: 12vw;
    }

    .destaque-nome-texto {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 2.4vh;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .destaque-sub-texto {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 1.6vh;
      font-weight: 400;
      color: #aaccff;
      text-transform: uppercase;
      margin-top: 0.2vh;
    }

    .destaque-preco-badge {
      background: #f0c040;
      border-radius: 0.5vw;
      padding: 0.3vh 1.2vw 0.5vh;
      text-align: center;
      min-width: 12vw;
    }

    .destaque-preco-linha {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0.2vw;
    }

    .destaque-preco-rs {
      font-family: 'Oswald', sans-serif;
      font-size: 1.8vh;
      font-weight: 700;
      color: #7a0000;
      margin-top: 0.8vh;
      line-height: 1;
    }

    .destaque-preco-valor {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 7vh;
      color: #7a0000;
      line-height: 1;
    }

    .destaque-preco-kg {
      font-family: 'Oswald', sans-serif;
      font-size: 1.6vh;
      font-weight: 700;
      color: #7a0000;
      align-self: flex-end;
      margin-bottom: 0.5vh;
    }

    .destaque-desconto-badge {
      background: #0d2d6e;
      border: 2px solid #f0c040;
      border-radius: 0.4vw;
      padding: 0.2vh 1.2vw;
      text-align: center;
      min-width: 12vw;
    }

    .destaque-desconto-texto {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3vh;
      color: #f0c040;
      letter-spacing: 2px;
    }

    /* Estado vazio */
    .vazio-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.3);
      font-size: 2vh;
      text-align: center;
      padding: 1vw;
    }

    /* ===== TELA DE CONEXÃO (aguarda o token gerado no painel) ===== */
    .tela-conectar {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 80% 60% at 70% 10%, rgba(46,124,246,.18), transparent),
        linear-gradient(160deg, #021226 20%, #0b2745 100%);
      z-index: 10;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .tela-conectar.visivel { display: flex; }

    .conectar-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.4vh;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 1.2vw;
      padding: 6vh 4vw;
      width: min(88vw, 560px);
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
      backdrop-filter: blur(4px);
    }

    .conectar-marca { line-height: 1.1; }
    .conectar-marca strong {
      display: block;
      font-size: 5vh;
      font-weight: 800;
      letter-spacing: 8px;
      color: #fff;
    }
    .conectar-marca small {
      display: block;
      margin-top: 0.8vh;
      font-size: 1.8vh;
      letter-spacing: 5px;
      color: #38bdf8;
      font-weight: 600;
    }

    .conectar-texto {
      font-size: 2vh;
      color: #9db4cf;
      line-height: 1.5;
      max-width: 42ch;
    }
    .conectar-texto b { color: #e8f0fa; font-weight: 600; }

    .conectar-input {
      width: 100%;
      max-width: 340px;
      padding: 2.2vh 1vw;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 4.2vh;
      font-weight: 700;
      letter-spacing: 1.2vw;
      text-transform: uppercase;
      color: #fff;
      background: rgba(2,18,38,.65);
      border: 2px solid rgba(255,255,255,.18);
      border-radius: 0.8vw;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .conectar-input::placeholder { color: rgba(255,255,255,.22); letter-spacing: 0.8vw; }
    .conectar-input:focus { border-color: #2e7cf6; box-shadow: 0 0 0 4px rgba(46,124,246,.25); }

    .conectar-btn {
      width: 100%;
      max-width: 340px;
      padding: 2vh;
      font-family: inherit;
      font-size: 2.2vh;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      background: #2e7cf6;
      border: none;
      border-radius: 0.8vw;
      cursor: pointer;
      transition: background .2s;
    }
    .conectar-btn:hover:not(:disabled) { background: #1f63d2; }
    .conectar-btn:disabled { opacity: .6; cursor: default; }

    .conectar-erro {
      min-height: 2.4vh;
      font-size: 1.9vh;
      color: #ff8a7a;
    }
  </style>
</head>
<body>
  <div class="tv-container">
    <img src="/img/acougue-tv-fundo.jpg" class="bg-image" alt="" />

    <!-- Lista de carnes -->
    <div class="lista-carnes">
      <div class="lista-wrapper" id="lista-wrapper">
        <div class="vazio-msg" id="lista-vazio" style="display:none">
          Nenhum produto cadastrado
        </div>
      </div>
    </div>

    <!-- Destaque -->
    <div class="destaque-area" id="destaque-area" style="display:none">
      <img class="destaque-foto" id="destaque-foto" src="" alt="" />
      <div class="destaque-info" id="destaque-info">
        <div class="destaque-nome-badge">
          <span class="destaque-nome-texto" id="destaque-nome">-</span>
          <span class="destaque-sub-texto" id="destaque-sub">-</span>
        </div>
        <div class="destaque-preco-badge">
          <div class="destaque-preco-linha">
            <span class="destaque-preco-rs">R$</span>
            <span class="destaque-preco-valor" id="destaque-valor">0,00</span>
            <span class="destaque-preco-kg">KG</span>
          </div>
        </div>
        <div class="destaque-desconto-badge" id="destaque-desconto-badge" style="display:none">
          <span class="destaque-desconto-texto" id="destaque-desconto-texto">-</span>
        </div>
      </div>
    </div>

    <!-- Conexão: aguarda o token gerado no painel Açougue TV -->
    <div class="tela-conectar" id="tela-conectar">
      <form class="conectar-card" id="form-conectar">
        <div class="conectar-marca">
          <strong>VIGIA</strong>
          <small>AÇOUGUE TV</small>
        </div>
        <p class="conectar-texto">
          Para conectar esta televisão, abra <b>Açougue TV</b> na retaguarda do VIGIA,
          gere o <b>token da TV</b> e digite-o abaixo.
        </p>
        <input class="conectar-input" id="input-token" maxlength="6" autocomplete="off"
               spellcheck="false" placeholder="••••••" autofocus>
        <button class="conectar-btn" type="submit" id="btn-conectar">Conectar TV</button>
        <span class="conectar-erro" id="conectar-erro"></span>
      </form>
    </div>
  </div>

  <script>
    const TV_TOKEN_KEY = 'acougue_tv_token';

    /** Ícone SVG por categoria da carne (subgrupo do Açougue). */
    function getIcone(categoria) {
      const t = (categoria || '').toLowerCase();
      const a = 'class="carne-icone" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"';

      if (t.includes('su') || t.includes('porc')) return `<svg ${a}>
        <ellipse cx="14" cy="18" rx="9" ry="7" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <circle cx="24" cy="16" r="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <ellipse cx="27" cy="18" rx="2.5" ry="2" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
        <circle cx="26.2" cy="18" r="0.7" fill="rgba(255,255,255,0.9)"/>
        <circle cx="27.8" cy="18" r="0.7" fill="rgba(255,255,255,0.9)"/>
        <path d="M21 11 L19 7 L23 9 Z" fill="rgba(255,255,255,0.7)" stroke="rgba(255,255,255,0.8)" stroke-width="1" stroke-linejoin="round"/>
        <path d="M5 17 C3 14, 4 10, 6 11 C8 12, 7 15, 5 15" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>`;

      if (t.includes('ave') || t.includes('frango') || t.includes('galinha')) return `<svg ${a}>
        <ellipse cx="13" cy="19" rx="8" ry="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <circle cx="23" cy="13" r="4.5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <path d="M27 14 L30 14 L28.5 16 Z" fill="rgba(255,255,255,0.8)"/>
        <circle cx="24" cy="12" r="1.2" fill="rgba(255,255,255,0.9)"/>
        <path d="M8 17 C6 13, 11 10, 14 14" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M21 9 C20 6, 22 6, 22 9" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </svg>`;

      if (t.includes('pesc') || t.includes('peix') || t.includes('mar')) return `<svg ${a}>
        <path d="M6 16 L2 10 L2 22 Z" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linejoin="round"/>
        <ellipse cx="17" cy="16" rx="11" ry="6.5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <circle cx="24" cy="14" r="2" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/>
        <circle cx="24.5" cy="14" r="0.8" fill="rgba(255,255,255,0.9)"/>
        <path d="M14 10 C16 7, 19 8, 18 11" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </svg>`;

      if (t.includes('embutido') || t.includes('linguiça') || t.includes('linguica') || t.includes('processado')) return `<svg ${a}>
        <ellipse cx="7" cy="20" rx="5" ry="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <ellipse cx="16" cy="16" rx="5" ry="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" transform="rotate(-20 16 16)"/>
        <ellipse cx="25" cy="11" rx="5" ry="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" transform="rotate(-40 25 11)"/>
        <path d="M11 19 C12.5 18, 13 17, 13 16" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M20 14 C21 13, 21.5 12, 21 11" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>`;

      // Bovinos (padrão)
      return `<svg ${a}>
        <path d="M4 8 C4 4, 8 2, 10 5 L10 8" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M28 8 C28 4, 24 2, 22 5 L22 8" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <ellipse cx="16" cy="16" rx="12" ry="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <ellipse cx="12" cy="14" rx="1.5" ry="1.5" fill="rgba(255,255,255,0.9)"/>
        <ellipse cx="20" cy="14" rx="1.5" ry="1.5" fill="rgba(255,255,255,0.9)"/>
        <ellipse cx="16" cy="20" rx="4" ry="2.5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
      </svg>`;
    }

    const FOTO_PLACEHOLDER = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540"><rect fill="#0d2d6e" width="960" height="540"/><text fill="#aaccff" x="480" y="300" text-anchor="middle" font-size="120">🥩</text></svg>'
    );

    let carnes = [];
    let destaques = [];
    let destaqueIdx = 0;
    let destaqueTimer = null;
    let dadosAnterior = '';

    function formatPreco(v) {
      return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    /**
     * A TV conecta digitando o token curto gerado no painel Açougue TV.
     * Depois de validado, o token fica no localStorage e a conexão é
     * permanente — só cai se um novo token for gerado no painel.
     */
    function mostrarConectar(mensagemErro) {
      document.getElementById('tela-conectar').classList.add('visivel');
      document.body.classList.remove('conectado');
      document.getElementById('conectar-erro').textContent = mensagemErro || '';
      document.getElementById('input-token').focus();
    }

    function marcarConectado() {
      document.getElementById('tela-conectar').classList.remove('visivel');
      document.body.classList.add('conectado');
    }

    function aplicarDados(data) {
      marcarConectado();
      const hash = JSON.stringify(data.items);
      if (hash === dadosAnterior) return;
      dadosAnterior = hash;
      carnes = data.items;
      renderizar();
    }

    async function buscarTv(token) {
      const res = await fetch('/api/acougue-tv/tv?token=' + encodeURIComponent(token));
      if (res.status === 401) return { invalido: true };
      const json = await res.json();
      if (!json.success) throw new Error(json.message || 'Falha na requisição');
      return { data: json.data };
    }

    async function fetchCarnes() {
      const token = localStorage.getItem(TV_TOKEN_KEY);
      if (!token) { mostrarConectar(); return; }

      try {
        const resultado = await buscarTv(token);
        if (resultado.invalido) {
          localStorage.removeItem(TV_TOKEN_KEY);
          mostrarConectar('A TV foi desconectada. Digite o token atual do painel.');
          return;
        }
        aplicarDados(resultado.data);
      } catch (err) {
        console.error('Erro ao buscar dados:', err);
      }
    }

    async function conectar(ev) {
      ev.preventDefault();
      const input = document.getElementById('input-token');
      const btn = document.getElementById('btn-conectar');
      const erro = document.getElementById('conectar-erro');
      const token = input.value.trim().toUpperCase();
      if (!token) { erro.textContent = 'Digite o token da TV'; return; }

      btn.disabled = true;
      btn.textContent = 'Conectando...';
      erro.textContent = '';
      try {
        const resultado = await buscarTv(token);
        if (resultado.invalido) {
          erro.textContent = 'Token inválido. Confira no painel Açougue TV.';
          return;
        }
        localStorage.setItem(TV_TOKEN_KEY, token);
        input.value = '';
        dadosAnterior = '';
        aplicarDados(resultado.data);
      } catch (err) {
        erro.textContent = 'Não foi possível conectar. Verifique a internet da TV.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Conectar TV';
      }
    }

    function renderizarLista() {
      const wrapper = document.getElementById('lista-wrapper');
      const vazioMsg = document.getElementById('lista-vazio');

      // Parar animação anterior
      wrapper.classList.remove('scrolling');
      wrapper.style.animationDuration = '';
      wrapper.innerHTML = '';

      if (!carnes.length) {
        vazioMsg.style.display = 'flex';
        wrapper.appendChild(vazioMsg);
        return;
      }

      vazioMsg.style.display = 'none';

      function criarItem(c) {
        const preco = c.precoPromocional !== null && c.precoPromocional !== undefined ? c.precoPromocional : c.preco;
        const div = document.createElement('div');
        div.className = 'carne-item';
        div.innerHTML = `
          ${getIcone(c.categoria)}
          <span class="carne-nome">${c.nome.toUpperCase()}</span>
          <div class="carne-preco-area">
            <span class="carne-rs">R$</span>
            <span class="carne-valor">${formatPreco(preco)}</span>
            <span class="carne-kg">&nbsp;${(c.unidade || 'KG').toUpperCase()}</span>
          </div>
        `;
        return div;
      }

      // Renderizar itens
      const frag = document.createDocumentFragment();
      carnes.forEach(c => frag.appendChild(criarItem(c)));
      wrapper.appendChild(frag);

      // Verificar se precisa de scroll
      requestAnimationFrame(() => {
        const listaEl = document.querySelector('.lista-carnes');
        const wrapperH = wrapper.scrollHeight;
        const containerH = listaEl.clientHeight;

        if (wrapperH > containerH) {
          // Duplicar para loop seamless
          const frag2 = document.createDocumentFragment();
          carnes.forEach(c => frag2.appendChild(criarItem(c)));
          wrapper.appendChild(frag2);

          // ~3.5s por item para leitura confortável
          const duracao = Math.max(carnes.length * 3.5, 20);
          wrapper.style.animationDuration = `${duracao}s`;
          wrapper.classList.add('scrolling');
        }
      });
    }

    function renderizarDestaque() {
      destaques = carnes.filter(c => c.destaque);
      destaqueIdx = 0;

      if (destaqueTimer) { clearInterval(destaqueTimer); destaqueTimer = null; }

      const area = document.getElementById('destaque-area');

      if (!destaques.length) {
        area.style.display = 'none';
        return;
      }

      area.style.display = 'block';
      mostrarDestaque(0);

      if (destaques.length > 1) {
        destaqueTimer = setInterval(() => {
          destaqueIdx = (destaqueIdx + 1) % destaques.length;
          mostrarDestaque(destaqueIdx);
        }, 3000);
      }
    }

    function mostrarDestaque(idx) {
      const carne = destaques[idx];
      const foto = document.getElementById('destaque-foto');
      const info = document.getElementById('destaque-info');

      // Fade out
      foto.style.opacity = '0';
      info.style.opacity = '0';

      setTimeout(() => {
        foto.src = carne.imagemUrl || FOTO_PLACEHOLDER;
        document.getElementById('destaque-nome').textContent = carne.nome.toUpperCase();
        document.getElementById('destaque-sub').textContent = (carne.categoria || (carne.unidade || 'KG')).toUpperCase();
        document.getElementById('destaque-valor').textContent = formatPreco(carne.precoPromocional !== null ? carne.precoPromocional : carne.preco);

        const descBadge = document.getElementById('destaque-desconto-badge');
        if (carne.percentualOff) {
          document.getElementById('destaque-desconto-texto').textContent = `${carne.percentualOff}% OFF`;
          descBadge.style.display = 'block';
        } else {
          descBadge.style.display = 'none';
        }

        foto.onerror = () => { foto.onerror = null; foto.src = FOTO_PLACEHOLDER; };
        foto.onload = () => { foto.style.opacity = '1'; info.style.opacity = '1'; };
        if (foto.complete && foto.src) { foto.style.opacity = '1'; info.style.opacity = '1'; }
      }, 450);
    }

    function renderizar() {
      renderizarLista();
      renderizarDestaque();
    }

    // Init
    document.getElementById('form-conectar').addEventListener('submit', conectar);
    document.getElementById('input-token').addEventListener('input', (ev) => {
      ev.target.value = ev.target.value.toUpperCase();
    });
    fetchCarnes();
    setInterval(fetchCarnes, 30000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Relatórios</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Relatórios</h1>
      </div>
      <div class="abas">
        <button class="ativa" data-aba="dia" onclick="trocarAba('dia')">Vendas do dia</button>
        <button data-aba="periodo" onclick="trocarAba('periodo')">Período</button>
        <button data-aba="produtos" onclick="trocarAba('produtos')">Produtos</button>
        <button data-aba="margem" onclick="trocarAba('margem')">Margem</button>
        <button data-aba="dre" onclick="trocarAba('dre')">DRE</button>
        <button data-aba="estoque" onclick="trocarAba('estoque')">Estoque crítico</button>
      </div>
      <div class="aba-conteudo ativa" id="aba-dia"><div class="cards"><div class="card"><div class="rotulo">Receita</div><div class="valor" id="receitaDia">—</div></div><div class="card"><div class="rotulo">Vendas</div><div class="valor" id="qtdDia">—</div></div></div></div>
      <div class="aba-conteudo" id="aba-periodo"><div class="painel"><table><thead><tr><th>Data</th><th>Total</th></tr></thead><tbody id="tabelaPeriodo"><tr><td colspan="2" class="vazio">Carregando...</td></tr></tbody></table></div></div>
      <div class="aba-conteudo" id="aba-produtos"><div class="painel"><table><thead><tr><th>Produto</th><th>Qtd</th><th>Receita</th></tr></thead><tbody id="tabelaProdutos"><tr><td colspan="3" class="vazio">Carregando...</td></tr></tbody></table></div></div>
      <div class="aba-conteudo" id="aba-margem"><div class="painel"><table><thead><tr><th>Produto</th><th>Receita</th><th>Custo</th><th>Margem</th></tr></thead><tbody id="tabelaMargem"><tr><td colspan="4" class="vazio">Carregando...</td></tr></tbody></table></div></div>
      <div class="aba-conteudo" id="aba-dre"><div class="painel"><table><thead><tr><th>Mês</th><th>Receita</th><th>Custo</th><th>Lucro</th></tr></thead><tbody id="tabelaDre"><tr><td colspan="4" class="vazio">Carregando...</td></tr></tbody></table></div></div>
      <div class="aba-conteudo" id="aba-estoque"><div class="painel"><table><thead><tr><th>Produto</th><th>Estoque</th><th>Mínimo</th></tr></thead><tbody id="tabelaEstoque"><tr><td colspan="3" class="vazio">Carregando...</td></tr></tbody></table></div></div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    initNavbar();
    function trocarAba(aba) { document.querySelectorAll('.abas button').forEach((b) => b.classList.toggle('ativa', b.dataset.aba === aba)); document.querySelectorAll('.aba-conteudo').forEach((c) => c.classList.toggle('ativa', c.id === 'aba-' + aba)); }
    async function carregar() {
      const dia = await API.get('/api/relatorios/vendas-dia');
      document.getElementById('receitaDia').textContent = UI.moeda(dia.receita || 0);
      document.getElementById('qtdDia').textContent = UI.numero(dia.total || 0);
      const periodo = await API.get('/api/relatorios/vendas-periodo');
      document.getElementById('tabelaPeriodo').innerHTML = periodo.vendas.map((v) => '<tr><td>' + UI.data(v.criadoEm) + '</td><td>' + UI.moeda(v.total) + '</td></tr>').join('');
      const produtos = await API.get('/api/relatorios/produtos-mais-vendidos');
      document.getElementById('tabelaProdutos').innerHTML = produtos.map((p) => '<tr><td>' + p.produtoId + '</td><td>' + p.qtd + '</td><td>' + UI.moeda(p.receita) + '</td></tr>').join('');
      const margem = await API.get('/api/relatorios/margem');
      document.getElementById('tabelaMargem').innerHTML = margem.map((m) => '<tr><td>' + m.produtoId + '</td><td>' + UI.moeda(m.receita) + '</td><td>' + UI.moeda(m.custo) + '</td><td>' + UI.moeda(m.margem) + '</td></tr>').join('');
      const dre = await API.get('/api/relatorios/dre-simplificado');
      document.getElementById('tabelaDre').innerHTML = '<tr><td>' + dre.mes + '</td><td>' + UI.moeda(dre.receita) + '</td><td>' + UI.moeda(dre.custo) + '</td><td>' + UI.moeda(dre.lucroBruto) + '</td></tr>';
      const estoque = await API.get('/api/relatorios/estoque-critico');
      document.getElementById('tabelaEstoque').innerHTML = estoque.map((p) => '<tr><td>' + UI.escapar(p.nome) + '</td><td>' + p.estoqueQtd + '</td><td>' + p.estoqueMin + '</td></tr>').join('');
    }
    (async () => { const usuario = await Auth.exigirLogin(); if (!usuario) return; await Auth.montarSidebar('relatorios.html'); await carregar(); })();
  </script>
</body>
</html>

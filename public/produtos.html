<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · Produtos</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Produtos</h1>
      </div>

      <div class="barra-acoes">
        <button class="btn" id="btnNovoProduto">Novo produto</button>
        <button class="btn secundario" id="btnAbrirImportar">Importar em lote</button>
      </div>

      <div class="painel">
        <table class="tabela-clicavel tabela-produtos">
          <thead>
            <tr>
              <th class="col-check">
                <button id="btnExcluirSelecionados" class="btn-icone perigo" style="display:none" title="Excluir selecionados"><i class="fa-solid fa-trash-can"></i></button>
                <input type="checkbox" id="checkTodos">
              </th>
              <th class="ordenavel" data-coluna="nome">Nome <i class="fa-solid fa-sort"></i></th>
              <th class="ordenavel" data-coluna="grupo">Grupo <i class="fa-solid fa-sort"></i></th>
              <th class="ordenavel" data-coluna="valor">Valor <i class="fa-solid fa-sort"></i></th>
              <th class="ordenavel" data-coluna="custoMedio">Custo médio <i class="fa-solid fa-sort"></i></th>
              <th class="ordenavel" data-coluna="estoqueTotal">Estoque total <i class="fa-solid fa-sort"></i></th>
              <th class="ordenavel" data-coluna="unidade">Unidade <i class="fa-solid fa-sort"></i></th>
              <th class="ordenavel" data-coluna="codigoReferencia">Cód. Ref. <i class="fa-solid fa-sort"></i></th>
              <th class="ordenavel" data-coluna="situacao">Situação <i class="fa-solid fa-sort"></i></th>
              <th class="col-acoes"></th>
            </tr>
            <tr class="linha-filtros">
              <th></th>
              <th><input type="text" id="filtro_nome" placeholder="Filtrar..."></th>
              <th><input type="text" id="filtro_grupo" placeholder="Filtrar..."></th>
              <th><input type="text" id="filtro_valor" placeholder="Filtrar..."></th>
              <th><input type="text" id="filtro_custoMedio" placeholder="Filtrar..."></th>
              <th><input type="text" id="filtro_estoqueTotal" placeholder="Filtrar..."></th>
              <th><input type="text" id="filtro_unidade" placeholder="Filtrar..."></th>
              <th><input type="text" id="filtro_codigoReferencia" placeholder="Filtrar..."></th>
              <th>
                <select id="filtro_situacao">
                  <option value="ativo">Ativo</option>
                  <option value="inativo">Inativo</option>
                  <option value="todos">Todos</option>
                </select>
              </th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabela"><tr><td colspan="10" class="vazio">Carregando...</td></tr></tbody>
        </table>
        <div class="paginacao">
          <button class="btn secundario pequeno" id="btnPaginaAnterior">Anterior</button>
          <span id="infoPagina"></span>
          <button class="btn secundario pequeno" id="btnPaginaProxima">Próxima</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal criar/editar -->
  <div class="modal-fundo" id="modalProduto">
    <div class="modal">
      <h2 id="tituloModal">Novo produto</h2>
      <div id="erroModal" class="msg-erro"></div>
      <div class="form-grid">
        <div class="campo"><label>EAN *</label><input id="f_ean" maxlength="14"></div>
        <div class="campo"><label>Nome *</label><input id="f_nome" maxlength="200"></div>
        <div class="campo"><label>Marca</label><input id="f_marca"></div>
        <div class="campo" style="position:relative">
          <label>NCM *</label>
          <input id="f_ncm" placeholder="Digite o código ou a descrição..." autocomplete="off">
          <div class="sugestoes" id="sugestoesNcm" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--linha);border-radius:6px;z-index:50;display:none;max-height:200px;overflow-y:auto;box-shadow:0 4px 10px rgba(0,0,0,.12)"></div>
        </div>
        <div class="campo" style="position:relative">
          <label>CFOP *</label>
          <input id="f_cfop" placeholder="Digite o código ou a descrição..." autocomplete="off">
          <div class="sugestoes" id="sugestoesCfop" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--linha);border-radius:6px;z-index:50;display:none;max-height:200px;overflow-y:auto;box-shadow:0 4px 10px rgba(0,0,0,.12)"></div>
        </div>
        <div class="campo" style="position:relative">
          <label>CST-IBS/CBS (Reforma Tributária) *</label>
          <input id="f_cstIbsCbs" placeholder="Digite o código ou a descrição..." autocomplete="off">
          <div class="sugestoes" id="sugestoesCstIbsCbs" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--linha);border-radius:6px;z-index:50;display:none;max-height:200px;overflow-y:auto;box-shadow:0 4px 10px rgba(0,0,0,.12)"></div>
        </div>
        <div class="campo" style="position:relative">
          <label>cClassTrib (Reforma Tributária) *</label>
          <input id="f_classTrib" placeholder="Digite o código ou a descrição..." autocomplete="off">
          <div class="sugestoes" id="sugestoesClassTrib" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--linha);border-radius:6px;z-index:50;display:none;max-height:200px;overflow-y:auto;box-shadow:0 4px 10px rgba(0,0,0,.12)"></div>
        </div>
        <div class="campo"><label>Unidade</label>
          <select id="f_unidade"><option>UN</option><option>KG</option><option>CX</option><option>L</option><option>PC</option><option>FD</option></select>
        </div>
        <div class="campo"><label>Preço (R$) *</label><input id="f_preco" type="number" step="0.01" min="0.01"></div>
        <div class="campo"><label>Custo médio (R$)</label><input id="f_custo" type="number" step="0.01" min="0"></div>
        <div class="campo"><label>Estoque atual</label><input id="f_estoque" type="number" step="0.001" min="0"></div>
        <div class="campo"><label>Estoque mínimo</label><input id="f_minimo" type="number" step="0.001" min="0"></div>
        <div class="campo"><label>Categoria (id opcional)</label><input id="f_categoria" placeholder="uuid da categoria"></div>
        <div class="campo" id="campoCodigoRef" style="display:none"><label>Cód. Ref.</label><input id="f_codigoRef" maxlength="20"></div>
        <div class="campo">
          <label><input type="checkbox" id="f_peso" style="width:auto"> Vendido por peso (balança)</label>
        </div>
        <div class="campo" id="campoPlu" style="display:none"><label>PLU (4 a 6 dígitos) *</label><input id="f_plu" maxlength="6"></div>
      </div>
      <div class="rodape">
        <button class="btn secundario" id="btnCancelarProduto">Cancelar</button>
        <button class="btn" id="btnSalvar">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal importação em lote -->
  <div class="modal-fundo" id="modalImportar">
    <div class="modal">
      <h2>Importar produtos em lote</h2>
      <div id="erroImportar" class="msg-erro"></div>
      <p style="font-size:14px;color:var(--cinza);margin-bottom:12px">
        1) Baixe o modelo · 2) Preencha e envie (CSV ou XLSX, até 5.000 linhas / 10MB) · 3) Confira a prévia · 4) Confirme.
      </p>
      <div class="barra-acoes">
        <button class="btn secundario" id="btnBaixarModelo">Baixar modelo.xlsx</button>
        <input type="file" id="arquivoImportar" accept=".csv,.xlsx,.xls">
        <button class="btn" id="btnGerarPreview">Gerar prévia</button>
      </div>
      <div id="areaPreview" style="display:none">
        <p id="resumoPreview" style="font-weight:600;margin:10px 0"></p>
        <div style="max-height:300px;overflow-y:auto">
          <table>
            <thead><tr><th>Linha</th><th>Nome</th><th>EAN</th><th>Status</th></tr></thead>
            <tbody id="tabelaPreview"></tbody>
          </table>
        </div>
        <div class="rodape">
          <button class="btn" id="btnConfirmarImportacao">Confirmar importação</button>
        </div>
      </div>
      <div class="rodape">
        <button class="btn secundario" id="btnFecharImportar">Fechar</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/toast.js"></script>
  <script>
  (() => {
    initNavbar();
    let pagina = 1, totalPaginas = 1, editandoId = null, tokenImportacao = null;
    // Ordenação em três estados: null (padrão do servidor) → asc → desc → null.
    let orderBy = null, order = 'asc';
    // Filtros por coluna, combinados com AND na query string (ver produto.repository.js).
    const filtros = { nome: '', grupo: '', valor: '', custoMedio: '', estoqueTotal: '', unidade: '', codigoReferencia: '', situacao: 'ativo' };
    // Ids marcados via checkbox na página atual, pra exclusão em lote.
    const selecionados = new Set();

    // Referências capturadas na injeção do script: se o usuário navegar para
    // outra página antes de um fetch terminar, buscar por id retornaria null;
    // nos elementos órfãos a escrita tardia é um no-op inofensivo.
    const $ = (id) => document.getElementById(id);
    const tabela = $('tabela'), infoPagina = $('infoPagina'), checkTodos = $('checkTodos'), btnExcluirSelecionados = $('btnExcluirSelecionados');
    const tituloModal = $('tituloModal'), erroModal = $('erroModal'), campoPlu = $('campoPlu'), campoCodigoRef = $('campoCodigoRef');
    const fEan = $('f_ean'), fNome = $('f_nome'), fMarca = $('f_marca'), fNcm = $('f_ncm'),
          fUnidade = $('f_unidade'), fPreco = $('f_preco'), fCusto = $('f_custo'),
          fEstoque = $('f_estoque'), fMinimo = $('f_minimo'), fCategoria = $('f_categoria'),
          fCodigoRef = $('f_codigoRef'), fPeso = $('f_peso'), fPlu = $('f_plu');
    const erroImportar = $('erroImportar'), arquivoImportar = $('arquivoImportar'),
          areaPreview = $('areaPreview'), resumoPreview = $('resumoPreview'),
          tabelaPreview = $('tabelaPreview'), btnConfirmarImportacao = $('btnConfirmarImportacao');

    function debounce(fn, ms) {
      let temporizador;
      return (...args) => { clearTimeout(temporizador); temporizador = setTimeout(() => fn(...args), ms); };
    }

    /**
     * Busca+seleção num catálogo fiscal de referência (NCM/CFOP/CST-IBS-CBS/
     * cClassTrib) — nunca texto livre. `obter()` só devolve um código real
     * quando o usuário CLICOU numa sugestão (ou quando `definir()` foi
     * chamado ao carregar o produto); digitar sem selecionar limpa a
     * seleção de propósito, pra nunca submeter texto livre digitado por
     * engano. Mesma fábrica de manutencao-produtos.html, duplicada aqui
     * porque cada página tem seu próprio escopo de script isolado.
     */
    function criarSeletorCatalogo({ inputId, sugestoesId, endpoint, formatarSugestao }) {
      const input = $(inputId), caixa = $(sugestoesId);
      let codigoSelecionado = null;

      const buscar = debounce(async () => {
        const termo = input.value.trim();
        if (!termo) { caixa.style.display = 'none'; return; }
        try {
          const itens = await API.get(endpoint + '?termo=' + encodeURIComponent(termo));
          caixa.innerHTML = itens.length
            ? itens.map((it) => '<div class="sugestao" data-codigo="' + UI.escapar(it.codigo) + '" data-texto="' + UI.escapar(formatarSugestao(it)) + '" style="padding:8px 12px;cursor:pointer">' + UI.escapar(formatarSugestao(it)) + '</div>').join('')
            : '<div style="padding:8px 12px;color:var(--cinza)">Nenhum código encontrado no catálogo</div>';
          caixa.style.display = 'block';
        } catch (e) { caixa.style.display = 'none'; }
      }, 300);

      input.addEventListener('input', () => { codigoSelecionado = null; buscar(); });
      caixa.addEventListener('click', (ev) => {
        const sug = ev.target.closest('.sugestao[data-codigo]');
        if (!sug) return;
        codigoSelecionado = sug.dataset.codigo;
        input.value = sug.dataset.texto;
        caixa.style.display = 'none';
      });

      return {
        obter: () => codigoSelecionado,
        definir(codigo, textoExibicao) {
          codigoSelecionado = codigo || null;
          input.value = textoExibicao || codigo || '';
        },
      };
    }

    const seletorNcm = criarSeletorCatalogo({ inputId: 'f_ncm', sugestoesId: 'sugestoesNcm', endpoint: '/api/produtos/catalogos/ncm', formatarSugestao: (it) => it.codigo + ' - ' + it.descricao });
    const seletorCfop = criarSeletorCatalogo({ inputId: 'f_cfop', sugestoesId: 'sugestoesCfop', endpoint: '/api/produtos/catalogos/cfop', formatarSugestao: (it) => it.codigo + ' - ' + it.descricao });
    const seletorCstIbsCbs = criarSeletorCatalogo({ inputId: 'f_cstIbsCbs', sugestoesId: 'sugestoesCstIbsCbs', endpoint: '/api/produtos/catalogos/cst-ibs-cbs', formatarSugestao: (it) => it.codigo + ' - ' + it.descricao });
    const seletorClassTrib = criarSeletorCatalogo({ inputId: 'f_classTrib', sugestoesId: 'sugestoesClassTrib', endpoint: '/api/produtos/catalogos/class-trib', formatarSugestao: (it) => it.codigo + ' - ' + it.descricao });

    function construirQuery() {
      const params = new URLSearchParams({ page: pagina, limit: 20 });
      if (orderBy) { params.set('orderBy', orderBy); params.set('order', order); }
      Object.entries(filtros).forEach(([chave, valor]) => { if (valor) params.set(chave, valor); });
      return params.toString();
    }

    function atualizarIconesOrdenacao() {
      document.querySelectorAll('th.ordenavel').forEach((th) => {
        const ativa = th.dataset.coluna === orderBy;
        th.classList.toggle('ativa', ativa);
        th.querySelector('i').className = ativa ? (order === 'asc' ? 'fa-solid fa-sort-up' : 'fa-solid fa-sort-down') : 'fa-solid fa-sort';
      });
    }

    function atualizarBotaoExcluirSelecionados() {
      btnExcluirSelecionados.style.display = selecionados.size > 0 ? 'inline-block' : 'none';
    }

    async function carregar() {
      const data = await API.get('/api/produtos?' + construirQuery());
      totalPaginas = data.totalPages || 1;
      infoPagina.textContent = 'Página ' + data.page + ' de ' + totalPaginas + ' · ' + data.total + ' produtos';
      // Cada recarga (página, filtro, ordenação) troca as linhas visíveis,
      // então a seleção anterior deixa de fazer sentido.
      selecionados.clear();
      checkTodos.checked = false;
      atualizarBotaoExcluirSelecionados();
      if (data.items.length === 0) { tabela.innerHTML = '<tr><td colspan="10" class="vazio">Nenhum produto encontrado.</td></tr>'; return; }
      tabela.innerHTML = data.items.map((p) =>
        '<tr data-id="' + p.id + '">' +
        '<td class="col-check"><input type="checkbox" class="check-produto" data-id="' + p.id + '"></td>' +
        '<td>' + UI.escapar(p.nome) + '</td>' +
        '<td>' + (p.categoria ? UI.escapar(p.categoria.nome) : '-') + '</td>' +
        '<td>' + UI.moeda(p.preco) + '</td>' +
        '<td>' + UI.moeda(p.custoMedio) + '</td>' +
        '<td>' + (Number(p.estoqueQtd) <= Number(p.estoqueMin) ? '<span class="tag erro">' + p.estoqueQtd + '</span>' : p.estoqueQtd) + '</td>' +
        '<td>' + p.unidade + '</td>' +
        '<td>' + (p.codigoReferencia || '-') + '</td>' +
        '<td><span class="tag ' + (p.ativo ? 'ok' : 'neutro') + '">' + (p.ativo ? 'Ativo' : 'Inativo') + '</span></td>' +
        '<td class="col-acoes"><div class="acoes-linha">' +
        '<button data-acao="copiar" data-id="' + p.id + '" title="Copiar"><i class="fa-solid fa-copy"></i></button>' +
        '<button class="perigo" data-acao="excluir" data-id="' + p.id + '" title="Excluir"><i class="fa-solid fa-trash-can"></i></button>' +
        '</div></td></tr>'
      ).join('');
    }

    function mudarPagina(delta) {
      const nova = pagina + delta;
      if (nova < 1 || nova > totalPaginas) return;
      pagina = nova; carregar();
    }

    function preencher(p) {
      fEan.value = p.ean || '';
      fNome.value = p.nome || '';
      fMarca.value = p.marca || '';
      seletorNcm.definir(p.ncm, p.ncm || '');
      seletorCfop.definir(p.cfop, p.cfop || '');
      seletorCstIbsCbs.definir(p.cstIbsCbs, p.cstIbsCbs || '');
      seletorClassTrib.definir(p.cClassTrib, p.cClassTrib || '');
      fUnidade.value = p.unidade || 'UN';
      fPreco.value = p.preco || '';
      fCusto.value = p.custoMedio || '';
      fEstoque.value = p.estoqueQtd || '';
      fMinimo.value = p.estoqueMin || '';
      fCategoria.value = p.categoriaId || '';
      fPeso.checked = !!p.vendidoPorPeso;
      fPlu.value = p.plu || '';
      campoPlu.style.display = p.vendidoPorPeso ? 'block' : 'none';
    }

    function abrirNovo() {
      editandoId = null;
      tituloModal.textContent = 'Novo produto';
      UI.limparErro(erroModal);
      preencher({});
      campoCodigoRef.style.display = 'none';
      UI.abrirModal('modalProduto');
    }

    // Edição migrou pra página dedicada de Manutenção de Produtos;
    // o modal desta tela ficou só pra criação (Novo produto / Copiar).

    /**
     * Pré-preenche o formulário de "Novo produto" com os dados do produto
     * original (nome, grupo, valor, custo médio, unidade). EAN fica vazio
     * (é único, não pode ser duplicado) e Cód. Ref. nem aparece na criação —
     * o próprio POST /api/produtos gera um novo sozinho. Não é um clone
     * vinculado: salva como produto novo e independente.
     */
    async function duplicar(id) {
      const p = await API.get('/api/produtos/' + id);
      abrirNovo();
      fNome.value = p.nome + ' - Cópia';
      fCategoria.value = p.categoriaId || '';
      fPreco.value = p.preco || '';
      fCusto.value = p.custoMedio || '';
      fUnidade.value = p.unidade || 'UN';
    }

    async function salvar() {
      UI.limparErro(erroModal);
      // NCM/CFOP/CST-IBS-CBS/cClassTrib são obrigatórios (exigência nova de
      // classificação fiscal completa — ver produto.validator.js) e só são
      // aceitos se vieram de uma sugestão clicada (nunca texto livre
      // digitado sem selecionar — ver seletorNcm/criarSeletorCatalogo).
      if (!seletorNcm.obter()) { UI.erro(erroModal, 'NCM é obrigatório: selecione um código do catálogo (exigência nova de classificação fiscal completa).'); return; }
      if (!seletorCfop.obter()) { UI.erro(erroModal, 'CFOP é obrigatório: selecione um código do catálogo (exigência nova de classificação fiscal completa).'); return; }
      if (!seletorCstIbsCbs.obter()) { UI.erro(erroModal, 'CST-IBS/CBS é obrigatório: selecione um código do catálogo (exigência nova de classificação fiscal completa).'); return; }
      if (!seletorClassTrib.obter()) { UI.erro(erroModal, 'cClassTrib é obrigatório: selecione um código do catálogo (exigência nova de classificação fiscal completa).'); return; }
      const body = {
        ean: fEan.value.trim(),
        nome: fNome.value.trim(),
        marca: fMarca.value.trim(),
        ncm: seletorNcm.obter() || '',
        cfop: seletorCfop.obter() || '',
        cstIbsCbs: seletorCstIbsCbs.obter() || '',
        cClassTrib: seletorClassTrib.obter() || '',
        unidade: fUnidade.value,
        preco: fPreco.value,
        custoMedio: fCusto.value || 0,
        estoqueQtd: fEstoque.value || 0,
        estoqueMin: fMinimo.value || 0,
        categoriaId: fCategoria.value.trim(),
        vendidoPorPeso: fPeso.checked,
        plu: fPlu.value.trim(),
      };
      if (editandoId) body.codigoReferencia = fCodigoRef.value.trim();
      UI.limparErro(erroModal);
      try {
        if (editandoId) await API.put('/api/produtos/' + editandoId, body);
        else await API.post('/api/produtos', body);
        UI.fecharModal('modalProduto');
        carregar();
      } catch (e) {
        UI.erro(erroModal, e);
      }
    }

    function remover(id) {
      return UI.confirmarAcao('Desativar este produto? Ele sairá das listagens (soft delete).', async () => {
        await API.del('/api/produtos/' + id);
        carregar();
      });
    }

    // ─── Importação em lote ───
    async function baixarModelo() {
      const blob = await API.request('/api/produtos/exportar/modelo');
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'modelo.xlsx'; a.click();
      URL.revokeObjectURL(url);
    }

    async function enviarPreview() {
      UI.limparErro(erroImportar);
      if (!arquivoImportar.files.length) { UI.erro(erroImportar, 'Selecione um arquivo CSV ou XLSX.'); return; }
      const form = new FormData();
      form.append('arquivo', arquivoImportar.files[0]);
      try {
        const data = await API.post('/api/produtos/importar/preview', form);
        tokenImportacao = data.tokenImportacao;
        resumoPreview.textContent =
          data.total + ' linhas · ' + data.validos + ' válidas · ' + data.invalidos + ' inválidas';
        tabelaPreview.innerHTML = data.itens.map((i) =>
          '<tr><td>' + i.linha + '</td><td>' + UI.escapar(i.nome || '-') + '</td><td>' + (i.ean || '-') + '</td>' +
          '<td>' + (i.status === 'valido'
            ? '<span class="tag ok">válido</span>'
            : '<span class="tag erro">inválido</span> <small>' + UI.escapar((i.erros || []).join('; ')) + '</small>') + '</td></tr>'
        ).join('');
        areaPreview.style.display = 'block';
        btnConfirmarImportacao.disabled = data.validos === 0;
      } catch (e) {
        UI.erro(erroImportar, e);
      }
    }

    async function confirmarImportacao() {
      UI.limparErro(erroImportar);
      try {
        const resultado = await API.post('/api/produtos/importar/confirmar', { tokenImportacao });
        alert('Importação concluída: ' + resultado.inseridos + ' inseridos, ' + resultado.ignorados + ' ignorados.');
        UI.fecharModal('modalImportar');
        areaPreview.style.display = 'none';
        carregar();
      } catch (e) {
        UI.erro(erroImportar, e);
      }
    }

    // ─── Eventos ───
    $('btnNovoProduto').addEventListener('click', abrirNovo);
    $('btnAbrirImportar').addEventListener('click', () => UI.abrirModal('modalImportar'));
    $('btnPaginaAnterior').addEventListener('click', () => mudarPagina(-1));
    $('btnPaginaProxima').addEventListener('click', () => mudarPagina(1));
    $('btnCancelarProduto').addEventListener('click', () => UI.fecharModal('modalProduto'));
    $('btnSalvar').addEventListener('click', salvar);
    $('btnBaixarModelo').addEventListener('click', baixarModelo);
    $('btnGerarPreview').addEventListener('click', enviarPreview);
    btnConfirmarImportacao.addEventListener('click', confirmarImportacao);
    $('btnFecharImportar').addEventListener('click', () => UI.fecharModal('modalImportar'));
    fPeso.addEventListener('change', (ev) => {
      campoPlu.style.display = ev.target.checked ? 'block' : 'none';
    });

    // Filtros por coluna: texto/número com debounce, Situação dispara na hora.
    ['nome', 'grupo', 'valor', 'custoMedio', 'estoqueTotal', 'unidade', 'codigoReferencia'].forEach((chave) => {
      $('filtro_' + chave).addEventListener('input', debounce((ev) => {
        filtros[chave] = ev.target.value.trim();
        pagina = 1;
        carregar();
      }, 400));
    });
    $('filtro_situacao').addEventListener('change', (ev) => {
      filtros.situacao = ev.target.value;
      pagina = 1;
      carregar();
    });

    // Ordenação por coluna.
    document.querySelectorAll('th.ordenavel').forEach((th) => {
      th.addEventListener('click', () => {
        const coluna = th.dataset.coluna;
        if (orderBy === coluna && order === 'asc') order = 'desc';
        else if (orderBy === coluna) { orderBy = null; order = 'asc'; } // 3º clique desseleciona
        else { orderBy = coluna; order = 'asc'; }
        pagina = 1;
        atualizarIconesOrdenacao();
        carregar();
      });
    });
    atualizarIconesOrdenacao();

    // "Selecionar todos" marca/desmarca as linhas visíveis e entra na seleção.
    checkTodos.addEventListener('change', () => {
      tabela.querySelectorAll('.check-produto').forEach((cb) => {
        cb.checked = checkTodos.checked;
        if (checkTodos.checked) selecionados.add(cb.dataset.id);
        else selecionados.delete(cb.dataset.id);
      });
      atualizarBotaoExcluirSelecionados();
    });

    // Checkbox de uma linha: entra/sai da seleção e mostra/esconde a lixeira
    // de exclusão em lote (ao lado do checkbox "selecionar todos").
    tabela.addEventListener('change', (ev) => {
      const cb = ev.target.closest('.check-produto');
      if (!cb) return;
      if (cb.checked) selecionados.add(cb.dataset.id);
      else selecionados.delete(cb.dataset.id);
      atualizarBotaoExcluirSelecionados();
    });

    btnExcluirSelecionados.addEventListener('click', () => {
      const ids = [...selecionados];
      UI.confirmarAcao(
        'Desativar ' + ids.length + ' produto(s) selecionado(s)? Eles sairão das listagens (soft delete).',
        async () => { await Promise.all(ids.map((id) => API.del('/api/produtos/' + id))); carregar(); }
      );
    });

    // Clique na linha abre a Manutenção de Produtos, exceto no checkbox e nas
    // ações (que já tratam o próprio clique e retornam antes de chegar aqui).
    tabela.addEventListener('click', (ev) => {
      const btnAcao = ev.target.closest('button[data-acao]');
      if (btnAcao) {
        if (btnAcao.dataset.acao === 'copiar') duplicar(btnAcao.dataset.id);
        if (btnAcao.dataset.acao === 'excluir') remover(btnAcao.dataset.id);
        return;
      }
      if (ev.target.closest('.col-check')) return;
      const linha = ev.target.closest('tr[data-id]');
      if (linha) window.location.href = 'manutencao-produtos.html?id=' + linha.dataset.id;
    });

    (async () => {
      const usuario = await Auth.exigirLogin();
      if (!usuario) return;
      await Auth.montarSidebar('produtos.html');
      carregar();
    })();
  })();
  </script>
</body>
</html>

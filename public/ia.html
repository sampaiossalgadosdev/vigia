<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIA · IA</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/navbar.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="topo">
        <h1>Sugestões de IA</h1>
      </div>
      <div class="barra-acoes"><button class="btn" id="btnGerar">Gerar sugestões de promoção</button></div>
      <div class="painel"><h2>Sugestões</h2><div id="listaSugestoes"></div></div>
      <div class="painel"><h2>Histórico</h2><div id="historicoIa"></div></div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
  (() => {
    initNavbar();
    // Referências capturadas na injeção do script: se o usuário navegar para
    // outra página antes de um fetch terminar, buscar por id retornaria null;
    // nos elementos órfãos a escrita tardia é um no-op inofensivo.
    const $ = (id) => document.getElementById(id);
    const listaSugestoes = $('listaSugestoes'), historicoIa = $('historicoIa');

    async function gerar() {
      const data = await API.post('/api/ia/sugestoes', {});
      listaSugestoes.innerHTML = data.sugestoes.map((s) => '<div class="card" style="margin-bottom:10px"><strong>' + UI.escapar(s.produto) + '</strong><div>Desconto: ' + s.desconto + '%</div><div>' + UI.escapar(s.justificativa) + '</div></div>').join('');
      await carregarHistorico();
    }
    async function carregarHistorico() {
      const data = await API.get('/api/ia/sugestoes/historico');
      historicoIa.innerHTML = data.map((d) => '<div class="card" style="margin-bottom:10px"><div>' + UI.data(d.criadoEm) + '</div><div>' + UI.escapar(d.resultadoMargem || '') + '</div></div>').join('');
    }
    $('btnGerar').addEventListener('click', gerar);
    (async () => { const usuario = await Auth.exigirLogin(); if (!usuario) return; await Auth.montarSidebar('ia.html'); await carregarHistorico(); })();
  })();
  </script>
</body>
</html>
